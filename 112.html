        }

            margin-bottom: 30px;
        }

        .search-container {
            max-width: 600px;
            margin: 0 auto;
            position: relative;
        }

        .search-box {
            width: 100%;
            padding: 16px 25px;
            font-size: 1.1rem;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            color: #fff;
            outline: none;
            transition: all 0.3s ease;
        }

        .search-box:focus {
            border-color: #38bdf8;
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.4);
            background: rgba(255, 255, 255, 0.12);
        }

        }

            z-index: 100;
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            padding: 15px 0;
            margin-bottom: 40px;
        }

            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
            list-style: none;
        }

        .nav-links a {
            color: #cbd5e1;
            text-decoration: none;
            padding: 10px 18px;
            border-radius: 25px;
            font-size: 0.9rem;
            background: rgba(255, 255, 255, 0.04);
            transition: all 0.25s ease;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .nav-links a:hover, .nav-links a.active {
            background: rgba(56, 189, 248, 0.15);
            color: #38bdf8;
            border-color: rgba(56, 189, 248, 0.3);

            padding-top: 20px;
            margin-bottom: 60px;
        }

            font-size: 1.8rem;
            margin-bottom: 25px;
            padding-bottom: 12px;
            border-bottom: 2px solid #38bdf8;
            color: #38bdf8;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 25px;
        }

        .card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.06);

            flex-direction: column;
            justify-content: space-between;
        }

            transform: translateY(-4px);
            background: rgba(255, 255, 255, 0.07);
            border-color: rgba(56, 189, 248, 0.35);
            box-shadow: 0 12px 30px rgba(56, 189, 248, 0.12);

            color: #fff;
            margin-bottom: 18px;
            line-height: 1.4;
        }

            color: #94a3b8;
            margin: 60px 0;

        // 2. ფუნქცია, რომელიც აჯგუფებს მონაცემებს უნიკალური კატეგორიების მიხედვით
        function getCategories(data) {
            const categories = {};
            data.forEach(item => {
                if (!categories[item.id]) {
                    categories[item.id] = item.categoryName;
                }
            });
            return categories;
        }

        // 3. ფუნქცია, რომელიც ქმნის ნავიგაციის მენიუს
        function renderNavigation() {
            const categories = getCategories(database);
            const navLinksContainer = document.getElementById('navLinks');
            
            let navHTML = `<li><a href="#" class="active" onclick="filterByCategory('all', event)">ყველა ობიექტი</a></li>`;
            
            for (let id in categories) {
                navHTML += `<li><a href="#${id}" onclick="filterByCategory('${id}', event)">${categories[id]}</a></li>`;
            }
            
            navLinksContainer.innerHTML = navHTML;
        }

        // 4. ფუნქცია, რომელიც აშენებს HTML ბარათებს ეკრანზე
        function renderCards(filterText = '', categoryId = 'all') {
            const contentContainer = document.getElementById('dynamic-content');
            const categories = getCategories(database);
            let hasResults = false;
            
            let finalHTML = '';

            // თითოეული კატეგორიისთვის ცალკე ვქმნით სექციას
            for (let id in categories) {
                // თუ კონკრეტული კატეგორია გვაქვს არჩეული ნავიგაციიდან და არ ემთხვევა, გამოვტოვოთ
                if (categoryId !== 'all' && categoryId !== id) continue;

                // ვფილტრავთ ამ კატეგორიის ობიექტებს საძიებო სიტყვის მიხედვით
                const filteredItems = database.filter(item => {
                    if (item.id !== id) return false;
                    
                    const query = filterText.toLowerCase();
                    return (
                        item.title.toLowerCase().includes(query) ||
                        item.phone.toLowerCase().includes(query) ||
                        item.address.toLowerCase().includes(query) ||
                        item.categoryName.toLowerCase().includes(query)
                    );
                });

                // თუ ამ სექციაში მოიძებნა რამე, ვბეჭდავთ სექციას და მის ბარათებს
                if (filteredItems.length > 0) {
                    hasResults = true;
                    
                    let sectionHTML = `
                        <section id="${id}">
                            <h2 class="section-title">${categories[id]}</h2>
                            <div class="grid-container">
                    `;

                    filteredItems.forEach(item => {
                        // თუ ტელეფონი ლინკი არ არის (მაგალითად: ონლაინ ჩატი), სხვანაირად გამოვაჩინოთ
                        const isNumber = /^\d+[\s\d]*$/.test(item.phone.replace(/\s/g, ''));
                        const phoneDisplay = isNumber 
                            ? `<a href="tel:${item.phone.replace(/\s/g, '')}">${item.phone}</a>` 
                            : item.phone;

                        sectionHTML += `
                            <div class="card">
                                <div class="card-content">
                                    <h3>${item.title}</h3>
                                    <div class="info-item">
                                        <span class="info-label">კონტაქტი:</span>
                                        <span class="info-value"><span class="hotline">${phoneDisplay}</span></span>
                                    </div>
                                    <div class="info-item">
                                        <span class="info-label">მისამართი:</span>
                                        <span class="info-value">${item.address}</span>
                                    </div>
                                    <div class="info-item">
                                        <span class="info-label">ვებ-გვერდი:</span>
                                        <span class="info-value"><a href="${item.website}" target="_blank">${item.website.replace('https://', '')}</a></span>
                                    </div>
                                </div>
                            </div>
                        `;
                    });

                    sectionHTML += `</div></section>`;
                    finalHTML += sectionHTML;
                }
            }

            contentContainer.innerHTML = finalHTML;
            
            // "შედეგი ვერ მოიძებნა" შეტყობინების მართვა
            document.getElementById('no-results').style.display = hasResults ? 'none' : 'block';
        }

        // 5. კატეგორიის მიხედვით ფილტრაციის ლოგიკა (მენიუზე კლიკისას)
        let currentCategory = 'all';
        function filterByCategory(categoryId, event) {
            event.preventDefault();
            currentCategory = categoryId;
            
            // აქტიური კლასის შეცვლა მენიუს ლინკებზე
            document.querySelectorAll('.nav-links a').forEach(a => a.classList.remove('active'));
            event.target.classList.add('active');
            
            const searchText = document.getElementById('searchInput').value;
            renderCards(searchText, categoryId);
        }

        // 6. რეალურ დროში ძებნის ლოგიკა (Input-ში წერისას)
        document.getElementById('searchInput').addEventListener('input', function() {
            renderCards(this.value, currentCategory);
        });

        // ინიციალიზაცია გვერდის ჩატვირთვისას
        renderNavigation();
        renderCards();
    </script>
