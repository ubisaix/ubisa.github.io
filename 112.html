<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>საქართველოს საინფორმაციო გზამკვლევი</title>
    <style>
        /* ზოგადი სტილები */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            scroll-behavior: smooth;
        }

        body {
            background: linear-gradient(rgba(15, 23, 42, 0.95), rgba(15, 23, 42, 0.95)), 
                        url('https://images.unsplash.com/photo-1451187580459-43490279c0fa?q=80&w=1920') no-repeat center center fixed;
            background-size: cover;
            color: #f1f5f9;
            min-height: 100vh;
            padding-bottom: 60px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* ჰედერი და ძებნა */
        header {
            text-align: center;
            padding: 50px 0 30px;
        }

        header h1 {
            font-size: 2.5rem;
            color: #fff;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
            margin-bottom: 10px;
        }

        header p {
            color: #cbd5e1;
            font-size: 1.1rem;
            margin-bottom: 30px;
        }

        .search-container {
            max-width: 600px;
            margin: 0 auto;
            position: relative;
        }

        .search-box {
            width: 100%;
            padding: 16px 25px;
            font-size: 1.1rem;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            color: #fff;
            outline: none;
            transition: all 0.3s ease;
        }

        .search-box:focus {
            border-color: #38bdf8;
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.4);
            background: rgba(255, 255, 255, 0.12);
        }

        .search-box::placeholder {
            color: #94a3b8;
        }

        /* აკორდეონის სტილები */
        .category-accordion {
            margin-bottom: 20px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .category-header {
            background: rgba(255, 255, 255, 0.04);
            padding: 20px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            user-select: none;
            transition: background 0.2s;
        }

        .category-header:hover {
            background: rgba(56, 189, 248, 0.08);
        }

        .category-title {
            font-size: 1.4rem;
            color: #38bdf8;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .toggle-icon {
            font-size: 1.1rem;
            color: #94a3b8;
            transition: transform 0.3s ease;
        }

        /* შიგთავსის დამალვა/გამოჩენა */
        .category-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out, padding 0.3s ease;
            padding: 0 25px;
            background: rgba(15, 23, 42, 0.4);
        }

        /* როცა აქტიურია (გახსნილია კატეგორია) */
        .category-accordion.active .category-content {
            max-height: 2000px; /* საკმარისი სიმაღლე ბარათებისთვის */
            padding: 25px;
        }

        .category-accordion.active .toggle-icon {
            transform: rotate(180deg);
            color: #38bdf8;
        }

        .category-accordion.active {
            border-color: rgba(56, 189, 248, 0.25);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
        }

        /* ბადე (Grid) */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
        }

        /* ბარათები */
        .card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 12px;
            padding: 20px;
            transition: all 0.25s ease;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .card:hover {
            transform: translateY(-2px);
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(56, 189, 248, 0.3);
        }

        .card-content h3 {
            font-size: 1.15rem;
            color: #fff;
            margin-bottom: 15px;
            line-height: 1.4;
        }

        /* ინფო ელემენტები */
        .info-item {
            margin-bottom: 10px;
            font-size: 0.9rem;
            display: flex;
            align-items: flex-start;
            line-height: 1.4;
        }

        .info-label {
            font-weight: bold;
            color: #94a3b8;
            min-width: 95px;
            flex-shrink: 0;
        }

        .info-value {
            color: #e2e8f0;
        }

        .hotline {
            background: rgba(56, 189, 248, 0.12);
            padding: 2px 8px;
            border-radius: 4px;
            color: #38bdf8;
            font-weight: bold;
            border: 1px solid rgba(56, 189, 248, 0.2);
            display: inline-block;
        }

        .info-value a {
            color: #38bdf8;
            text-decoration: none;
        }

        .info-value a:hover {
            text-decoration: underline;
        }

        #no-results {
            text-align: center;
            font-size: 1.3rem;
            color: #94a3b8;
            margin: 60px 0;
            display: none;
        }
    </style>
</head>
<body>

    <header>
        <div class="container">
            <h1>საქართველოს საინფორმაციო გზამკვლევი</h1>
            <p>მოძებნეთ და ჩამოშალეთ სასურველი კატეგორია ინფორმაციის მისაღებად</p>
            <div class="search-container">
                <input type="text" id="searchInput" class="search-box" placeholder="ჩაწერეთ სახელი, ნომერი ან მისამართი...">
            </div>
        </div>
    </header>

    <div class="container">
        <div id="no-results">სამწუხაროდ, მსგავსი ობიექტი ვერ მოიძებნა...</div>
        <div id="accordion-container"></div>
    </div>

    <script>
        // 1. მონაცემთა ბაზა განახლებული კატეგორიებით (პარლამენტი, რესტორნები, აფთიაქები...)
        const database = [
            // --- სახელმწიფო ორგანოები და უწყებები ---
            {

                website: "https://tbilisi.gov.ge"
            },
            {

                categoryName: "სახელმწიფო ორგანოები და უწყებები",

                phone: "2 405 405",
                address: "თბილისი, სანაპიროს ქ. 2",
                website: "https://psh.gov.ge"
            },
            {
                id: "state",
                categoryName: "სახელმწიფო ორგანოები და უწყებები",
                title: "საქართველოს მთავრობის ადმინისტრაცია",
                phone: "111",
                address: "თბილისი, ინგოროყვას ქ. 7",
                website: "https://gov.ge"
            },

            // --- კლინიკები და საავადმყოფოები ---
            {
                id: "hospitals",
                categoryName: "კლინიკები და საავადმყოფოები",
                title: "ნიუ ჰოსპიტალს (New Hospitals)",
                phone: "2 190 190",
                address: "თბილისი, კრწანისის ქ. 12",
                website: "https://newhospitals.ge"
            },
            {
                id: "hospitals",
                categoryName: "კლინიკები და საავადმყოფოები",
                title: "ავერსის კლინიკა (ცენტრალური)",
                phone: "2 500 700",
                address: "თბილისი, აკაკი წერეთლის გამზ. 141ა",
                website: "https://aversiclinic.ge"
            },
            {
                id: "hospitals",
                categoryName: "კლინიკები და საავადმყოფოები",

                address: "თბილისი, ქავთარაძის ქ. 16",

            },

            // --- აფთიაქები ---
            {

                title: "ავერსი აფთიაქი (საინფორმაციო)",
                phone: "2 987 878",
                address: "ყველა უბანში და რეგიონში (24/7 ფილიალები)",
                website: "https://aversi.ge"
            },
            {
                id: "pharmacies",
                categoryName: "აფთიაქები",
                title: "პსპ აფთიაქი (PSP Pharmacy)",
                phone: "2 404 040",
                address: "ფართო ქსელი მთელი საქართველოს მასშტაბით",
                website: "https://psp.ge"
            },
            {
                id: "pharmacies",
                categoryName: "აფთიაქები",
                title: "ჯიპისი (GPC აფთიაქი)",
                phone: "2 940 700",
                address: "თბილისი და რეგიონები",
                website: "https://gpc.ge"
            },

            // --- რესტორნები და კაფეები ---
            {
                id: "restaurants",
                categoryName: "რესტორნები და კაფეები",
                title: "რესტორნების ქსელი „წისქვილი ჯგუფი“",
                phone: "2 530 797",
                address: "თბილისი: ბელიაშვილის ქც. / წყნეთის გზატკეცილი / ვახუშტი ბაგრატიონის ხიდი",
                website: "https://tsiskvili.ge"
            },
            {
                id: "restaurants",
                categoryName: "რესტორნები და კაფეები",
                title: "შუხმანი ვაინ ბარი (Schuchmann Wine Bar)",
                phone: "032 2 601 555",
                address: "თბილისი, სიონის ქ. 8 (კარვასლა)",
                website: "https://schuchmann-wine.com"
            },
            {
                id: "restaurants",
                categoryName: "რესტორნები და კაფეები",
                title: "რესტორანი „ამაყი“ (Tabla/Proud)",
                phone: "2 601 111",
                address: "თბილისი, ილია ჭავჭავაძის გამზ. 33",
                website: "https://tabla.ge"
            },

            // --- ბანკები და ფინანსები ---
            {
                id: "finance",
                categoryName: "ბანკები და ფინანსები",
                title: "საქართველოს ბანკი (Bank of Georgia)",
                phone: "2 444 444",
                address: "სათაო: თბილისი, ა. ყაზბეგის გამზ. 29ა",
                website: "https://bog.ge"
            },
            {
                id: "finance",
                categoryName: "ბანკები და ფინანსები",
                title: "თიბისი ბანკი (TBC Bank)",
                phone: "2 272 727",
                address: "სათაო: თბილისი, კ. მარჯანიშვილის ქ. 7",
                website: "https://tbcbank.ge"
            }
        ];

        // 2. უნიკალური კატეგორიების ამოღება ბაზიდან
        function getUniqueCategories(data) {
            const categories = {};
            data.forEach(item => {
                if (!categories[item.id]) {
                    categories[item.id] = item.categoryName;
                }
            });
            return categories;
        }

        // 3. აკორდეონების გენერირება და ეკრანზე გამოტანა
        function renderAccordion(filterText = '') {
            const container = document.getElementById('accordion-container');
            const categories = getUniqueCategories(database);
            const query = filterText.toLowerCase().trim();
            
            let finalHTML = '';
            let globalHasResults = false;

            for (let catId in categories) {
                // ვფილტრავთ ამ კონკრეტული კატეგორიის ობიექტებს
                const filteredItems = database.filter(item => {
                    if (item.id !== catId) return false;
                    return (
                        item.title.toLowerCase().includes(query) ||
                        item.phone.toLowerCase().includes(query) ||
                        item.address.toLowerCase().includes(query) ||
                        item.categoryName.toLowerCase().includes(query)
                    );
                });

                // თუ ამ კატეგორიაში რამე მოიძებნა, ვაწყობთ აკორდეონს
                if (filteredItems.length > 0) {
                    globalHasResults = true;
                    
                    // თუ მომხმარებელი რამეს ეძებს, კატეგორია ავტომატურად გახსნილი იყოს ('active')
                    const isExpanded = query.length > 0 ? 'active' : '';

                    let catHTML = `
                        <div class="category-accordion ${isExpanded}" id="accordion-${catId}">
                            <div class="category-header" onclick="toggleAccordion('${catId}')">
                                <div class="category-title">
                                    <span>📁</span> ${categories[catId]} (${filteredItems.length})
                                </div>
                                <div class="toggle-icon">▼</div>
                            </div>
                            <div class="category-content">
                                <div class="grid-container">
                    `;

                    filteredItems.forEach(item => {
                        catHTML += `
                            <div class="card">
                                <div class="card-content">
                                    <h3>${item.title}</h3>
                                    <div class="info-item">
                                        <span class="info-label">კონტაქტი:</span>
                                        <span class="info-value"><span class="hotline">${item.phone}</span></span>
                                    </div>
                                    <div class="info-item">
                                        <span class="info-label">მისამართი:</span>
                                        <span class="info-value">${item.address}</span>
                                    </div>
                                    <div class="info-item">
                                        <span class="info-label">ვებ-გვერდი:</span>
                                        <span class="info-value">
                                            <a href="${item.website}" target="_blank">${item.website.replace('https://', '')}</a>
                                        </span>
                                    </div>
                                </div>
                            </div>
                        `;
                    });

                    catHTML += `
                                </div>
                            </div>
                        </div>
                    `;
                    finalHTML += catHTML;
                }
            }

            container.innerHTML = finalHTML;

            // "ვერაფერი მოიძებნა" ბლოკის მართვა
            document.getElementById('no-results').style.display = globalHasResults ? 'none' : 'block';
        }

        // 4. კატეგორიის გახსნა/დაკეტვის ფუნქცია (Toggle)
        function toggleAccordion(catId) {
            const accordionElement = document.getElementById(`accordion-${catId}`);
            if (accordionElement) {
                accordionElement.classList.toggle('active');
            }
        }

        // 5. რეალურ დროში ძებნა
        document.getElementById('searchInput').addEventListener('input', function() {
            renderAccordion(this.value);
        });

        // გვერდის პირველადი ჩატვირთვა
        renderAccordion();
    </script>
</body>
</html>
