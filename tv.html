<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Luka TV - ტელევიზია</title>
    
    <link rel="icon" href="/img/Logo-300x300.png" sizes="192x192"/>
    <link href="https://fonts.googleapis.com/css2?family=Fira+GO:wght@300;400;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Fira GO', sans-serif;
            background-color: #0f172a; /* მუქი ფონი */
            color: #fff;
            /* უკანა ფონის სურათი - ტელევიზიის/სტუდიის თემატიკა */
            background-image: linear-gradient(rgba(15, 23, 42, 0.9), rgba(15, 23, 42, 0.9)), 
                              url('https://images.unsplash.com/photo-1593784991095-a205039470b6?auto=format&fit=crop&q=80&w=2000');
            background-attachment: fixed;
            background-size: cover;
            background-position: center;
        }

        .navbar {
            background-color: rgba(0, 0, 0, 0.8) !important;
            backdrop-filter: blur(10px); /* შუშის ეფექტი */
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .hero-section {
            padding: 80px 0 40px;
            text-align: center;
        }

        /* პლეერის ჩარჩო "ნეონის" ეფექტით */
        .video-container {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            border-radius: 20px;
            box-shadow: 0 0 40px rgba(0, 210, 255, 0.2);
            border: 1px solid rgba(255,255,255,0.1);
            background: #000;
        }

        .video-container iframe {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none;
        }

        /* არხების სექცია (ახალი) */
        .channel-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            transition: all 0.3s ease;
            cursor: pointer;
            text-decoration: none;
            color: white;
            padding: 20px;
            display: block;
        }

        .channel-card:hover {
            background: rgba(0, 210, 255, 0.1);
            transform: translateY(-5px);
            border-color: #00d2ff;
        }

        .footer-custom {
            background: rgba(0, 0, 0, 0.9);
            padding: 40px 0;
            margin-top: 80px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark sticky-top">
    <div class="container">
        <a class="navbar-brand fw-bold" href="#">
            <span style="color: #00d2ff;">LUKA</span> TV
        </a>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link text-white" href="/">მთავარი</a></li>
                <li class="nav-item"><a class="nav-link text-white" href="#">პირდაპირი ეთერი</a></li>
                <li class="nav-item"><a class="nav-link text-white" href="#">პროგრამა</a></li>
            </ul>
        </div>
    </div>
</nav>

<header class="hero-section">
    <div class="container">
        <h1 class="display-3 fw-bold mb-3">LUKA TV <span class="text-info">LIVE</span></h1>
        <p class="lead opacity-75">საუკეთესო ხარისხი თქვენს ეკრანზე</p>
    </div>
</header>

<main class="container">
    <div class="row justify-content-center mb-5">
        <div class="col-lg-10">
            <div class="video-container">
                <iframe src="https://tv.mar.tv/" allowfullscreen="true" allow="autoplay; fullscreen"></iframe>
            </div>
        </div>
    </div>

    <!-- ახალი სექცია: რას ვუყუროთ? -->
    <div class="row mt-5">
        <div class="col-12 mb-4">
            <h3 class="fw-bold">პოპულარული კატეგორიები</h3>
        </div>
        <div class="col-md-4 mb-3">
            <a href="#" class="channel-card text-center">
                <i class="fa fa-film mb-2"></i>
                <h5>ფილმები</h5>
            </a>
        </div>
        <div class="col-md-4 mb-3">
            <a href="#" class="channel-card text-center">
                <h5>სპორტი</h5>
            </a>
        </div>
        <div class="col-md-4 mb-3">
            <a href="#" class="channel-card text-center">
                <h5>საბავშვო</h5>
            </a>
        </div>
    </div>
</main>

<footer class="footer-custom mt-5">
    <div class="container text-center">
        <p class="opacity-50">საიტი შექმნილია სიყვარულით - მე მიყვარს უბისა</p>
        <div id="top-ge-counter-container" data-site-id="75558"></div>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
