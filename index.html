<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ubisa - სამშენებლო კალკულატორი</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Helvetica+Neue:wght@300;400;600&display=swap');

        :root {
            --primary-color: #3b82f6;
            --bg-color: #f1f5f9;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --input-border: #e2e8f0;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            color: var(--text-main);
        }

        .app-container {
            width: 100%;
            max-width: 500px;
            background: var(--card-bg);
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        h2 {
            text-align: center;
            font-size: 1.5rem;
            margin-bottom: 24px;
            color: var(--primary-color);
        }

        .input-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            font-size: 0.9rem;
            margin-bottom: 6px;
            font-weight: 600;
            color: #64748b;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid var(--input-border);
            border-radius: 12px;
            font-size: 1rem;
            transition: border-color 0.2s;
            outline: none;
        }

        input:focus {
            border-color: var(--primary-color);
        }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .btn-calc {
            width: 100%;
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: transform 0.1s;
        }

        .btn-calc:active {
            transform: scale(0.98);
        }

        .result-card {
            margin-top: 24px;
            background: #f8fafc;
            border-radius: 16px;
            padding: 20px;
            border: 1px solid #e2e8f0;
        }

        .result-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 1rem;
        }

        .result-item span:last-child {
            font-weight: 700;
            color: var(--primary-color);
        }

        .divider {
            height: 1px;
            background: #e2e8f0;
            margin: 10px 0;
        }

        /* მობილურისთვის მორგება */
        @media (max-width: 400px) {
            body { padding: 10px; }
            .app-container { border-radius: 16px; padding: 16px; }
        }
    </style>
</head>
<body>

<div class="app-container">
    <h2>კედლის ბლოკის კალკულატორი</h2>

    <div class="input-group">
        <label>კედლის სიგრძე (მეტრი)</label>
        <input type="number" id="length" placeholder="მაგ: 10">
    </div>

    <div class="input-group">
        <label>კედლის სიმაღლე (მეტრი)</label>
        <input type="number" id="height" placeholder="მაგ: 3">
    </div>

    <div class="grid-2">
        <div class="input-group">
            <label>კარის ფართობი (მ²)</label>
            <input type="number" id="door" value="0">
        </div>
        <div class="input-group">
            <label>ფანჯრის ფართობი (მ²)</label>
            <input type="number" id="window" value="0">
        </div>
    </div>

    <div class="input-group">
        <label>ბლოკის რაოდენობა 1 კვადრატულზე</label>
        <input type="number" id="perSquare" value="12.5">
    </div>

    <div class="input-group">
        <label>1 ბლოკის ფასი (₾)</label>
        <input type="number" id="price" value="1.50">
    </div>

    <button class="btn-calc" onclick="calculate()">დათვლა</button>

    <div id="result" class="result-card" style="display: none;">
        <div class="result-item">
            <span>კედლის ფართობი:</span>
            <span id="resArea">0 მ²</span>
        </div>
        <div class="result-item">
            <span>სუფთა ფართობი:</span>
            <span id="resNetArea">0 მ²</span>
        </div>
        <div class="divider"></div>
        <div class="result-item">
            <span>ბლოკის რაოდენობა:</span>
            <span id="resCount">0 ცალი</span>
        </div>
        <div class="result-item" style="font-size: 1.2rem; color: #000;">
            <span>ჯამური ფასი:</span>
            <span id="resTotal">0 ₾</span>
        </div>
    </div>
</div>

<script>
    function calculate() {
        const length = parseFloat(document.getElementById('length').value) || 0;
        const height = parseFloat(document.getElementById('height').value) || 0;
        const door = parseFloat(document.getElementById('door').value) || 0;
        const windowArea = parseFloat(document.getElementById('window').value) || 0;
        const perSquare = parseFloat(document.getElementById('perSquare').value) || 0;
        const price = parseFloat(document.getElementById('price').value) || 0;

        if (length <= 0 || height <= 0) {
            alert("გთხოვთ შეიყვანოთ კედლის ზომები");
            return;
        }

        const totalArea = length * height;
        const netArea = totalArea - (door + windowArea);
        const blockCount = Math.ceil(netArea * perSquare);
        const totalPrice = (blockCount * price).toFixed(2);

        document.getElementById('resArea').innerText = totalArea + " მ²";
        document.getElementById('resNetArea').innerText = netArea + " მ²";
        document.getElementById('resCount').innerText = blockCount + " ცალი";
        document.getElementById('resTotal').innerText = totalPrice + " ₾";

        document.getElementById('result').style.display = 'block';
    }
</script>

</body>
</html>
