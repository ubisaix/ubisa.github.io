<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ბედის ბორბალი - Decision Maker</title>
    <style>
        :root {
            --primary: #6c5ce7;
            --secondary: #a29bfe;
            --dark: #2d3436;
            --light: #fab1a0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--dark);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }

        h1 { margin-bottom: 10px; color: var(--light); }

        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 40px;
            margin-top: 20px;
        }

        /* ბორბლის სექცია */
        .wheel-container {
            position: relative;
            width: 400px;
            height: 400px;
        }

        #canvas {
            border-radius: 50%;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            border: 5px solid var(--secondary);
        }

        /* ისარი */
        .arrow {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 0; 
            height: 0; 
            border-left: 20px solid transparent;
            border-right: 20px solid transparent;
            border-top: 40px solid var(--light);
            z-index: 10;
        }

        /* მართვის პანელი */
        .controls {
            background: rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 15px;
            width: 300px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 5px;
            border: none;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 12px;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            transition: 0.3s;
            margin-bottom: 10px;
        }

        .btn-add { background: var(--secondary); color: white; }
        .btn-spin { background: var(--light); color: var(--dark); font-size: 1.2rem; }
        .btn-spin:disabled { opacity: 0.5; cursor: not-allowed; }

        ul { list-style: none; padding: 0; max-height: 150px; overflow-y: auto; }
        li {
            background: rgba(255,255,255,0.05);
            margin-bottom: 5px;
            padding: 8px;
            border-radius: 4px;
            display: flex;
            justify-content: space-between;
        }

        #result {
            margin-top: 20px;
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--light);
            min-height: 1.6em;
        }
    </style>
</head>
<body>

    <h1>გადაწყვეტილების მიმღები</h1>
    
    <div class="container">
        <div class="wheel-container">
            <div class="arrow"></div>
            <canvas id="canvas" width="400" height="400"></canvas>
        </div>

        <div class="controls">
            <input type="text" id="optionInput" placeholder="ჩაწერეთ ვარიანტი...">
            <button class="btn-add" onclick="addOption()">დამატება</button>
            <ul id="optionsList"></ul>
            <button class="btn-spin" id="spinBtn" onclick="spin()">დაატრიალე!</button>
        </div>
    </div>

    <div id="result"></div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const input = document.getElementById('optionInput');
        const listDisplay = document.getElementById('optionsList');
        const spinBtn = document.getElementById('spinBtn');
        const resultDisplay = document.getElementById('result');

        let options = ["პიცა", "ბურგერი", "სუში", "ხინკალი"];
        let startAngle = 0;
        let arc = Math.PI / (options.length / 2);
        let spinTimeout = null;

        const colors = ["#6c5ce7", "#fd79a8", "#00b894", "#ffeaa7", "#fab1a0", "#0984e3"];

        function drawWheel() {
            arc = Math.PI / (options.length / 2);
            ctx.clearRect(0, 0, 400, 400);

            options.forEach((text, i) => {
                const angle = startAngle + i * arc;
                ctx.fillStyle = colors[i % colors.length];
                
                ctx.beginPath();
                ctx.moveTo(200, 200);
                ctx.arc(200, 200, 190, angle, angle + arc, false);
                ctx.lineTo(200, 200);
                ctx.fill();

                ctx.save();
                ctx.fillStyle = "white";
                ctx.translate(200 + Math.cos(angle + arc / 2) * 130, 200 + Math.sin(angle + arc / 2) * 130);
                ctx.rotate(angle + arc / 2 + Math.PI / 2);
                ctx.font = 'bold 16px Arial';
                ctx.fillText(text, -ctx.measureText(text).width / 2, 0);
                ctx.restore();
            });
        }

        function addOption() {
            if (input.value) {
                options.push(input.value);
                input.value = "";
                updateUI();
            }
        }

        function updateUI() {
            listDisplay.innerHTML = "";
            options.forEach((opt, idx) => {
                const li = document.createElement('li');
                li.innerHTML = `${opt} <span style="cursor:pointer" onclick="removeOption(${idx})">❌</span>`;
                listDisplay.appendChild(li);
            });
            drawWheel();
        }

        function removeOption(idx) {
            options.splice(idx, 1);
            updateUI();
        }

        let spinAngleStart = 0;
        let spinTime = 0;
        let spinTimeTotal = 0;

        function spin() {
            if (options.length < 2) return alert("დაამატეთ მინიმუმ 2 ვარიანტი!");
            spinAngleStart = Math.random() * 10 + 10;
            spinTime = 0;
            spinTimeTotal = Math.random() * 3 + 4 * 1000;
            spinBtn.disabled = true;
            resultDisplay.innerText = "ირჩევა...";
            rotateWheel();
        }

        function rotateWheel() {
            spinTime += 30;
            if (spinTime >= spinTimeTotal) {
                stopRotateWheel();
                return;
            }
            const spinAngle = spinAngleStart - easeOut(spinTime, 0, spinAngleStart, spinTimeTotal);
            startAngle += (spinAngle * Math.PI / 180);
            drawWheel();
            spinTimeout = setTimeout(rotateWheel, 30);
        }

        function stopRotateWheel() {
            clearTimeout(spinTimeout);
            const degrees = startAngle * 180 / Math.PI + 90;
            const arcd = arc * 180 / Math.PI;
            const index = Math.floor((360 - degrees % 360) / arcd);
            const winner = options[(index + options.length) % options.length];
            resultDisplay.innerText = "შენი არჩევანია: " + winner;
            spinBtn.disabled = false;
        }

        function easeOut(t, b, c, d) {
            const ts = (t /= d) * t;
            const tc = ts * t;
            return b + c * (tc + -3 * ts + 3 * t);
        }

        updateUI(); // საწყისი ჩატვირთვა
    </script>
</body>
</html>
