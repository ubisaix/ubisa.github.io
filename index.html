<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Pro | UBISA</title>
    <script async src="https://cse.google.com/cse.js?cx=00008e50948c04f2a"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: Arial, sans-serif;
            background-color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-top: 15vh;
        }

        .logo {
            font-size: 70px;
            font-weight: bold;
            margin-bottom: 30px;
            letter-spacing: -2px;
        }
        .logo span:nth-child(1) { color: #ff0000; }
        .logo span:nth-child(2) { color: #000; }

        .search-container {
            width: 100%;
            max-width: 600px;
            padding: 0 20px;
        }

        /* ჩვენი საკუთარი დიზაინი ძებნისთვის */
        .custom-search-box {
            display: flex;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1), 0 0 0 1px rgba(0,0,0,0.1);
            border-radius: 12px;
            overflow: hidden;
        }

        input#myQuery {
            flex: 1;
            height: 50px;
            border: none;
            padding: 0 20px;
            font-size: 18px;
            outline: none;
        }

        .btn-search {
            background-color: #ffcc00;
            border: none;
            padding: 0 25px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-search:hover { background-color: #f5c400; }

        /* ადგილი სადაც Google შედეგებს ჩასვამს */
        .results-box {
            width: 100%;
            max-width: 900px;
            margin-top: 20px;
        }

        .info-panel {
            margin-top: 50px;
            display: flex;
            gap: 20px;
        }
        .card {
            padding: 15px;
            border: 1px solid #eee;
            border-radius: 8px;
            font-size: 14px;
            min-width: 150px;
        }
    </style>
</head>
<body>

    <div class="logo">
        <span>S</span><span>earchPro</span>
    </div>

    <div class="search-container">
        <div class="custom-search-box">
            <input type="text" id="myQuery" placeholder="მოძებნე ყველაფერი..." onkeypress="handleKeyPress(event)">
            <button class="btn-search" onclick="executeSearch()">Search</button>
        </div>
    </div>

    <div class="results-box">
        <div class="gcse-searchresults-only"></div>
    </div>

    <div class="info-panel">
        <div class="card"><h4>ამინდი</h4><p>თბილისი: +18°C</p></div>
        <div class="card"><h4>ვალუტა</h4><p>USD: 2.65 GEL</p></div>
    </div>

    <script>
        // ფუნქცია რომელიც Google-ის ძებნას "აღვიძებს"
        function executeSearch() {
            const query = document.getElementById('myQuery').value;
            if (query) {
                // ვეუბნებით Google-ს რომ მოძებნოს ჩვენი ტექსტი
                const element = google.search.cse.element.getElement('results-only');
                if (element) {
                    element.execute(query);
                    // ვმალავთ ლოგოს და პანელს რომ ადგილი გათავისუფლდეს
                    document.querySelector('.logo').style.fontSize = '30px';
                    document.querySelector('.info-panel').style.display = 'none';
                } else {
                    // თუ API ჯერ არ ჩაიტვირთა, ვიყენებთ ალტერნატივას
                    console.log("Search is loading...");
                }
            }
        }

        function handleKeyPress(e) {
            if (e.key === 'Enter') executeSearch();
        }
    </script>

</body>
</html>
