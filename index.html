<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inter-Active Jokes</title>
    <style>
        :root {
            --primary: #6c5ce7;
            --secondary: #a29bfe;
            --accent: #fd79a8;
            --dark: #2d3436;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            /* მხიარული სმაილების ფონი */
            background-color: #f0f2f5;
            background-image: url("https://www.transparenttextures.com/patterns/cubes.png"), 
                              linear-gradient(135deg, #6c5ce7 0%, #a29bfe 100%);
            background-attachment: fixed;
        }

        .main-container {
            width: 90%;
            max-width: 600px;
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            text-align: center;
            backdrop-filter: blur(10px);
        }

        h1 { color: var(--dark); margin-bottom: 30px; font-size: 2rem; }

        /* კატეგორიების ღილაკები */
        .category-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .cat-btn {
            padding: 20px;
            border: none;
            border-radius: 15px;
            background: var(--primary);
            color: white;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
            box-shadow: 0 4px 15px rgba(108, 92, 231, 0.3);
        }

        .cat-btn:hover {
            transform: translateY(-3px);
            background: #5849c4;
        }

        /* მოდალური ფანჯარა (ჩამოსაშლელი) */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: white;
            width: 85%;
            max-width: 500px;
            padding: 40px;
            border-radius: 20px;
            position: relative;
            text-align: center;
            animation: popIn 0.3s ease-out;
        }

        @keyframes popIn {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .joke-display {
            font-size: 1.3rem;
            line-height: 1.6;
            color: #333;
            min-height: 150px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 30px;
        }

        .nav-buttons {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-btn {
            background: var(--secondary);
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            color: white;
            cursor: pointer;
            font-weight: bold;
        }

        .close-btn {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 2rem;
            cursor: pointer;
            color: #999;
        }

        .counter {
            color: #666;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

<div class="main-container">
    <h1>😂 აირჩიე კატეგორია</h1>
    <div class="category-grid">
        <button class="cat-btn" onclick="openJokes('kakhelebi')">🍇 კახელები</button>
        <button class="cat-btn" onclick="openJokes('svanebi')">🏔️ სვანები</button>
        <button class="cat-btn" onclick="openJokes('gurulebi')">🌿 გურულები</button>
        <button class="cat-btn" onclick="openJokes('megrelebi')">🌽 იმერელი/მეგრელი</button>
        <button class="cat-btn" onclick="openJokes('others')" style="grid-column: span 2; background: var(--accent);">🎭 სხვადასხვა</button>
    </div>
</div>

<div id="jokeModal" class="modal">
    <div class="modal-content">
        <span class="close-btn" onclick="closeModal()">&times;</span>
        <div id="jokeText" class="joke-display">აქ გამოჩნდება ანეგდოტი...</div>
        
        <div class="nav-buttons">
            <button class="nav-btn" onclick="prevJoke()">⬅️ უკან</button>
            <span id="jokeCounter" class="counter">1 / 10</span>
            <button class="nav-btn" onclick="nextJoke()">წინ ➡️</button>
        </div>
    </div>
</div>

<script>
    const allJokes = {
        kakhelebi: [
            "მიხო ექიმთანაა: 'ექიმო, მარჯვენა ყურით აღარაფერი მესმის'. ექიმი: 'ღვინოს ბევრს ხომ არ სვამ?' მიხო: 'ვსვამ, შენი ჭირიმე'. ექიმი: 'უნდა დაანებო'. მიხო: 'კაი ერთი, რაცხა უნდა მოვისმინო იმაზე კაი რა უნდა მითხრან?'",
            "მიხო და მარო ლოგინში წვანან. მარო: 'მიხო, ერთი ტკბილი სიტყვა მითხარი რა'. მიხო: 'შაქარი, დედაკაცო, შაქარი!'",
            "მიხომ შვილი ქალაქში გაგზავნა. ჩამოვიდა ბიჭი: 'მამა, ვეგეტარიანელი გავხდი'. მიხო: 'ეგ რაღაა?' - 'ხორცს აღარ ვჭამ'. მიხო: 'ვაჰ, მწვადი რომ არ გინდოდეს, ისედაც ვიცოდით, რო კახელი არ იყავი!'",
            "მიხო ვირზე ზის. მეზობელი: 'საით მიქრიხარ?' მიხო: 'მე კი არა, ვირს ჰკითხე, მე ფეხები ზემოთ მიჭირავს!'",
            "მარო: 'მიხო, ამ მანქანას ტორმუზი სადა აქვს?' მიხო: 'ეგეთები თუ გინდოდა, ველოსიპედი გეყიდაო!'",
            "რა არის ბედნიერება? მიხო: 'როცა მეზობელს ძროხა მოუკვდება... უბედურება კი ისაა, როცა შენი ძროხა გადარჩება და იმას რძე ექნება!'",
            "მიხო და შვილი სუფრაზე სხედან. შვილი: 'მამა, კიდევ დამისხი'. მიხო: 'ღვინო გონიერებისთვისაა და შენ მაგას რას ეპოტინები?'",
            "მარო: 'მიხო, ჩვენს შვილს ცოლი მოჰყავს'. მიხო: 'მერე მე რა ვქნა, თავის თავს დააბრალოს!'",
            "ტაქსის მძღოლი: '10 ლარი მომეცი'. მიხო: '5 მომართვი, შენც ხომ მოდიოდი აქეთ?'",
            "მღვდელი: 'შესწირე რამე ტაძარს'. მიხო: 'ღმერთმა ხომ ყველაფერი იცის? ჰოდა, ისიც ეცოდინება, რო ჯიბეში არაფერი მიდევს'."
        ],
        svanebi: [
            "სვანი კომპიუტერთან ტირის: 'ფაილი ჩემი დოკუმენტები წავშალე და ახლა უსაბუთო ვარო!'",
            "სვანს ეკითხებიან: 'მეტრო როგორ მოგეწონა?' - 'კარგია, მარა ის ვერ გავიგე, ხალხი გვირაბში რატომ ცხოვრობს'.",
            "სვანმა ტელევიზორი დაშალა – შიგნით დიქტორი ვერ იპოვა და ეწყინა.",
            "სვანი ხეზე ზის და ტოტს ჭრის. გამვლელი: 'ჩამოვარდები!' ჩამოვარდა სვანი: 'შენ რა, წინასწარმეტყველი ხარ?'",
            "შუქნიშანზე მწვანე აინთო, სვანი მაინც დგას. პოლიციელი: 'რა იყო, ფერი არ მოგეწონა?'",
            "სვანმა კოკა-კოლა გახსნა, ყინულები არ დახვდა: 'სულ როგორ უნდა გატყუებდნენ ესენიო!'",
            "რატომ გძინავს შარვლით? სვანი: 'სიზმარში უცხო ხალხი მხვდება და მერიდებაო'.",
            "სვანმა თოფს ლულა მოუღუნა, მოსახვევში მინდა ვესროლოო.",
            "ექიმო, თავი მტკივა. ექიმი: 'ალბათ ბევრს ფიქრობ'. სვანი: 'არა, კედელს მივარტყი'.",
            "სვანმა სნიკერსი შეჭამა და მერე მარსი იყიდა, იქნებ კოსმოსში მაინც გავფრინდეო."
        ],
        gurulebi: [
            "გურული: 'ისეთი კარგად ვარ, მეშინია, არ მეწყინოს რამეო'.",
            "ბაზარში: 'ეს ქათამი რამდენი წლისაა?' - 'ორი'. - 'პასპორტი აჩვენე, თვარა მეზობლის ბავშვივით პატარა მეჩვენება!'",
            "გურული შვილს: 'წადი წყალი მოიტარე, თვარა ისეთს გიზამ, წყალი მოგანატრო!'",
            "ექიმო, ოპერაცია რამდენი ხანია? - 'საათი'. - 'კაი, მარა მე სად ვიქნები მაგ დროს?'",
            "კახელი: 'ჩვენთან ჩიტი ვერ გადაფრინდება ვენახს'. გურული: 'ჩვენთან ისეთი ჩიტებია, შუაში გადიანო'.",
            "ინგლისური იცი? - 'კი'. - 'How are you რას ნიშნავს?' - 'როგორ ხარ, შენი ჭირიმე'.",
            "ცოლი მოიყვანა გურულმა. 'აბა როგორია?' - 'რა ვიცი, დედამისი უფრო მეტს ლაპარაკობდაო'.",
            "მატარებელში: 'გამატარეთ, ფეხით უფრო მალე მივალო!'",
            "ღვინო წყალს გავსო. - 'აბა წყალი დაასხი და ნახე თუ დაემსგავსებაო'.",
            "რატომ არ მუშაობ? - 'მუშაობა რომ მინდოდეს, გურიაში კი არ ვიქნებიო'."
        ],
        megrelebi: [
            "მეგრელი: 'ზუგდიდში ყველა მეგრელია და თბილისში ჩამოვედი, ვინმე ხო უნდა მოვატყუოო?'",
            "ფოსფორის წამალი: 'ხედავ? 10 ლარი რომ გადაიხადე, უკვე დაიწყო ტვინმა მუშაობაო'.",
            "დათვი მოდის, ხეზე ავიდეთ! სვანი: 'რატომ, მე ხომ არ დავუნახივარ?'",
            "იმერელი სტუმარს: 'კიდევ მიირთვით'. - 'ყელში მაქვს'. - 'ცოტა ჩაჩოჩდით და ჩავაო!'",
            "მეგრელი ლოტოს იგებს: 'ნეტა ვის მოვატყუო, რომ უფრო მეტი მოვიგეო?'",
            "იმერლის ოცნება: 'მე ვიყო თამადა და ყველა ჩემს სადღეგრძელოს სვამდესო'.",
            "სწავლა თუ გინდა - თბილისში, ფული თუ გინდა - ბაზარში, ორივე თუ გინდა - მეგრელი უნდა იყოო.",
            "შენი ქათამი ჩემსას ეჩხუბა და მოუგო, ჰოდა ჩემიაო!",
            "მეგრელი პოლიციელი: 'სურათზე რატომ არ გავხართ? ახლავე გადაგიღებთო!'",
            "რა კარგია ცხოვრება! გურული: 'ვისთვის როგორ, ძამა!'"
        ],
        others: [
            "ვირთხები ფეხბურთს თამაშობენ. - წამალი დალიე. - ხვალ შეიძლება? დღეს ფინალი აქვთო!",
            "ვინც სულელია ადგეს. ერთი ბავშვი ადგა: 'მას, შემეცოდეთ მარტო რომ დგახართო'.",
            "პატრული: 'სად მიდიხართ?' - 'ცოლის ლექციაზე, სად იყავი აქამდეო'.",
            "მამა, 5 ლარი მომეცი, დედამ თქვა ჭკვიანი ხარო.",
            "ცოლმა სტაფილოს დიეტა დაიწყო. - დაიკლო? - არა, მარა ყურები დაუგრძელდა!",
            "ფუტკარმა მიკბინა. - რატომ არ გააგდე? - სანამ დედამისმა არ მოაკითხა, არ მშორდებოდაო.",
            "შენი ძაღლი რატომ არ ყეფს? - პადოშაა და ხმა არ ამოეღებაო.",
            "სარკეში ვიხედები და გული მერევა. ექიმი: 'მხედველობა კარგი გქონიათო'.",
            "რატომ გაქვს საათი მარჯვენაზე? - მარცხენაზე სამაჯური მიკეთიაო.",
            "წელს სად ისვენებდი? - არსად. - როგორი იყო? - კარგი, ხალხი არ იყოო!"
        ]
    };

    let currentCategory = [];
    let currentIndex = 0;

    function openJokes(cat) {
        currentCategory = allJokes[cat];
        currentIndex = 0;
        updateJoke();
        document.getElementById('jokeModal').style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('jokeModal').style.display = 'none';
    }

    function updateJoke() {
        document.getElementById('jokeText').innerText = currentCategory[currentIndex];
        document.getElementById('jokeCounter').innerText = (currentIndex + 1) + " / " + currentCategory.length;
    }

    function nextJoke() {
        if (currentIndex < currentCategory.length - 1) {
            currentIndex++;
            updateJoke();
        } else {
            currentIndex = 0; // წრეზე დატრიალება
            updateJoke();
        }
    }

    function prevJoke() {
        if (currentIndex > 0) {
            currentIndex--;
            updateJoke();
        } else {
            currentIndex = currentCategory.length - 1;
            updateJoke();
        }
    }

    // ფანჯრის გარეთ დაწკაპუნებით დახურვა
    window.onclick = function(event) {
        if (event.target == document.getElementById('jokeModal')) {
            closeModal();
        }
    }
</script>

</body>
</html>
