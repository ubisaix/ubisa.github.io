<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <title>ჩემი ხარჯების კალკულატორი</title>
</head>
<body>

    <section id="calculator">
        <h2>💰 ხარჯების აღრიცხვა</h2>
        <p>შეიტანეთ მონაცემები თქვენი ბიუჯეტის გასაკონტროლებლად:</p>

        <form id="expense-form">
            
            <label for="amount">თანხა (₾):</label><br>
            <input type="number" id="amount" name="amount" placeholder="მაგ: 50" required>
            <br><br>

            <label for="category">კატეგორია:</label><br>
            <select id="category" name="category">
                <option value="food">🍱 საკვები</option>
                <option value="transport">🚗 ტრანსპორტი</option>
                <option value="entertainment">🎮 გართობა</option>
                <option value="bills">📑 კომუნალურები</option>
                <option value="other">✨ სხვა</option>
            </select>
            <br><br>

            <label for="date">თარიღი:</label><br>
            <input type="date" id="date" name="date">
            <br><br>

            <button type="button" onclick="addExpense()">დამატება</button>
        </form>

        <hr>

        <h3>ისტორია:</h3>
        <ul id="expense-list">
            <li>ჯერჯერობით ჩანაწერი არ არის...</li>
        </ul>

        <h4>ჯამური ხარჯი: <span id="total-amount">0</span> ₾</h4>
    </section>

</body>
</html>
