<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Decision Maker</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        body {
            margin: 0;
            background: #0f0c29;
            background: linear-gradient(to bottom, #24243e, #302b63, #0f0c29);
            color: white;
            font-family: 'Helvetica Neue', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: #00d2ff;
            text-shadow: 0 0 20px #00d2ff;
        }

        .main-layout {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 50px;
        }

        /* ბორბლის სტილი */
        .wheel-box {
            position: relative;
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 50%;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }

        canvas {
            border-radius: 50%;
            transition: transform 4s cubic-bezier(0.15, 0, 0.15, 1);
        }

        .pointer {
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 40px;
            filter: drop-shadow(0 0 10px #ff0055);
            z-index: 100;
        }

        /* მართვის პანელი */
        .ui-panel {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            width: 350px;
            text-align: center;
        }

        input {
            background: rgba(255,255,255,0.1);
            border: 1px solid #00d2ff;
            padding: 15px;
            border-radius: 10px;
            color: white;
            width: 80%;
            margin-bottom: 15px;
            outline: none;
        }

        .spin-btn {
            background: linear-gradient(45deg, #00d2ff, #3a7bd5);
            border: none;
            padding: 15px 40px;
            border-radius: 50px;
            color: white;
            font-weight: bold;
            font-size: 1.2rem;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.4);
            transition: 0.3s;
        }

        .spin-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(0, 210, 255, 0.6);
        }

        /* მოგებულის ტექსტი */
        #winner-popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            background: white;
            color: #222;
            padding: 40px;
            border-radius: 20px;
            font-size: 2rem;
            font-weight: bold;
            z-index: 1000;
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-align: center;
        }

        #winner-popup.active { transform: translate(-50%, -50%) scale(1); }

        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            display: none;
            z-index: 999;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>ბედის ბორბალი</h1>
        <p>მიეცი სამყაროს საშუალება, აირჩიოს შენთვის</p>
    </div>

    <div class="main-layout">
        <div class="wheel-box">
            <svg class="pointer" viewBox="0 0 20 20" fill="#ff0055">
                <path d="M10 0 L20 20 L0 20 Z" />
            </svg>
            <canvas id="wheel" width="450" height="450"></canvas>
        </div>

        <div class="ui-panel">
            <input type="text" id="itemInput" placeholder="დაამატე ვარიანტი...">
            <button class="spin-btn" onclick="spinWheel()">დაატრიალე</button>
        </div>
    </div>

    <div id="winner-popup">
        <small>არჩევანი გაკეთებულია:</small>
        <div id="winner-text"></div>
        <button onclick="closePopup()" style="margin-top:20px; padding:10px 20px; cursor:pointer;">OK</button>
    </div>
    <div class="overlay" id="overlay"></div>

    <script>
        const canvas = document.getElementById("wheel");
        const ctx = canvas.getContext("2d");
        const input = document.getElementById("itemInput");
        
        let items = ["Netflix", "კითხვა", "ვარჯიში", "ძილი", "თამაში"];
        let currentRotation = 0;

        function drawWheel() {
            const numSegments = items.length;
            const angle = (2 * Math.PI) / numSegments;
            ctx.clearRect(0, 0, 450, 450);

            items.forEach((item, i) => {
                ctx.beginPath();
                ctx.fillStyle = i % 2 === 0 ? "#1e1e2f" : "#2a2a40";
                ctx.strokeStyle = "#00d2ff";
                ctx.lineWidth = 2;
                ctx.moveTo(225, 225);
                ctx.arc(225, 225, 220, i * angle, (i + 1) * angle);
                ctx.fill();
                ctx.stroke();

                // ტექსტი
                ctx.save();
                ctx.translate(225, 225);
                ctx.rotate(i * angle + angle / 2);
                ctx.fillStyle = "#fff";
                ctx.font = "bold 18px Arial";
                ctx.fillText(item, 100, 10);
                ctx.restore();
            });
        }

        function spinWheel() {
            const randomSpin = Math.floor(Math.random() * 360) + 3600; // მინიმუმ 10 ბრუნი
            currentRotation += randomSpin;
            canvas.style.transform = `rotate(${currentRotation}deg)`;

            setTimeout(() => {
                const actualDeg = currentRotation % 360;
                const segmentAngle = 360 / items.length;
                // გამოთვლა რომელი მოხვდა ისართან (ისარი ზემოთაა, ანუ 270 გრადუსზე)
                const winningIndex = Math.floor((360 - (actualDeg % 360)) / segmentAngle);
                showWinner(items[winningIndex]);
            }, 4000);
        }

        function showWinner(text) {
            document.getElementById("winner-text").innerText = text;
            document.getElementById("winner-popup").classList.add("active");
            document.getElementById("overlay").style.display = "block";
            
            // კონფეტის გაშვება
            confetti({
                particleCount: 150,
                spread: 70,
                origin: { y: 0.6 }
            });
        }

        function closePopup() {
            document.getElementById("winner-popup").classList.remove("active");
            document.getElementById("overlay").style.display = "none";
        }

        input.addEventListener("keypress", (e) => {
            if (e.key === "Enter" && input.value) {
                items.push(input.value);
                input.value = "";
                drawWheel();
            }
        });

        drawWheel();
    </script>
</body>
</html>
