<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ubisa Calculator</title>
    <style>
        /* თანამედროვე ფონტის იმპორტი */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');

        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            --calc-bg: rgba(30, 41, 59, 0.7);
            --accent-color: #38bdf8;
            --operator-color: #f59e0b;
            --btn-bg: rgba(255, 255, 255, 0.05);
            --btn-hover: rgba(255, 255, 255, 0.1);
            --text-color: #f8fafc;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            font-family: 'Inter', sans-serif;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: var(--bg-gradient);
            color: var(--text-color);
            overflow: hidden;
        }

        /* კალკულატორის კონტეინერი */
        .calculator {
            width: 100%;
            max-width: 400px;
            background: var(--calc-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 32px;
            padding: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* ეკრანის სექცია */
        .display {
            padding: 20px 10px;
            text-align: right;
            margin-bottom: 20px;
        }

        #previous-operand {
            font-size: 1.1rem;
            color: rgba(248, 250, 252, 0.5);
            min-height: 1.5rem;
            word-wrap: break-word;
            word-break: break-all;
        }

        #current-operand {
            font-size: 3.5rem;
            font-weight: 300;
            margin: 0;
            word-wrap: break-word;
            word-break: break-all;
        }

        /* ღილაკების ბადე */
        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        button {
            border: none;
            outline: none;
            background: var(--btn-bg);
            color: var(--text-color);
            font-size: 1.5rem;
            font-weight: 400;
            padding: 20px 0;
            border-radius: 18px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        button:hover {
            background: var(--btn-hover);
        }

        button:active {
            transform: scale(0.92);
            background: rgba(255, 255, 255, 0.15);
        }

        /* სპეციალური ღილაკები */
        .span-two {
            grid-column: span 2;
        }

        .operator {
            color: var(--operator-color);
            font-weight: 600;
        }

        .equals {
            background: var(--accent-color);
            color: #0f172a;
            font-weight: 600;
        }

        .equals:hover {
            background: #7dd3fc;
        }

        .clear {
            color: #f87171;
        }

        /* აპლიკაციისთვის ადაპტაცია */
        @media (max-width: 480px) {
            .calculator {
                height: 100vh;
                max-width: 100%;
                border-radius: 0;
                display: flex;
                flex-direction: column;
                justify-content: flex-end;
                padding-bottom: 40px;
            }
            
            #current-operand {
                font-size: 4rem;
            }
        }
    </style>
</head>
<body>

    <div class="calculator">
        <div class="display">
            <div id="previous-operand"></div>
            <div id="current-operand">0</div>
        </div>
        <div class="buttons">
            <button class="span-two clear" onclick="clearDisplay()">AC</button>
            <button class="clear" onclick="deleteNumber()">DEL</button>
            <button class="operator" onclick="appendOperator('/')">÷</button>
            
            <button onclick="appendNumber('7')">7</button>
            <button onclick="appendNumber('8')">8</button>
            <button onclick="appendNumber('9')">9</button>
            <button class="operator" onclick="appendOperator('*')">×</button>
            
            <button onclick="appendNumber('4')">4</button>
            <button onclick="appendNumber('5')">5</button>
            <button onclick="appendNumber('6')">6</button>
            <button class="operator" onclick="appendOperator('-')">−</button>
            
            <button onclick="appendNumber('1')">1</button>
            <button onclick="appendNumber('2')">2</button>
            <button onclick="appendNumber('3')">3</button>
            <button class="operator" onclick="appendOperator('+')">+</button>
            
            <button onclick="appendNumber('.')">.</button>
            <button onclick="appendNumber('0')">0</button>
            <button class="span-two equals" onclick="calculate()">=</button>
        </div>
    </div>

    <script>
        let currentInput = '0';
        let previousInput = '';
        let operator = null;

        const currentDisplay = document.getElementById('current-operand');
        const previousDisplay = document.getElementById('previous-operand');

        function updateDisplay() {
            currentDisplay.innerText = currentInput;
            if (operator != null) {
                previousDisplay.innerText = `${previousInput} ${operator}`;
            } else {
                previousDisplay.innerText = '';
            }
        }

        function appendNumber(number) {
            if (number === '.' && currentInput.includes('.')) return;
            if (currentInput === '0' && number !== '.') {
                currentInput = number;
            } else {
                currentInput += number;
            }
            updateDisplay();
        }

        function appendOperator(op) {
            if (currentInput === '') return;
            if (previousInput !== '') {
                calculate();
            }
            operator = op;
            previousInput = currentInput;
            currentInput = '';
            updateDisplay();
        }

        function clearDisplay() {
            currentInput = '0';
            previousInput = '';
            operator = null;
            updateDisplay();
        }

        function deleteNumber() {
            if (currentInput.length === 1) {
                currentInput = '0';
            } else {
                currentInput = currentInput.slice(0, -1);
            }
            updateDisplay();
        }

        function calculate() {
            let computation;
            const prev = parseFloat(previousInput);
            const current = parseFloat(currentInput);
            if (isNaN(prev) || isNaN(current)) return;

            switch (operator) {
                case '+': computation = prev + current; break;
                case '-': computation = prev - current; break;
                case '*': computation = prev * current; break;
                case '/': 
                    if(current === 0) { alert("შეცდომა!"); clearDisplay(); return; }
                    computation = prev / current; 
                    break;
                default: return;
            }
            currentInput = computation.toString();
            operator = null;
            previousInput = '';
            updateDisplay();
        }
    </script>
</body>
</html>
