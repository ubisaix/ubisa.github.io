<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>სამშენებლო კალკულატორი</title>
    <style>
        :root {
            --primary-color: #f39c12;
            --dark-bg: rgba(0, 0, 0, 0.7);
            --glass-bg: rgba(255, 255, 255, 0.15);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            /* უკანა ფონის სურათი */
            background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), 
                        url('https://images.unsplash.com/photo-1581094794329-c8112a89af12?q=80&w=2070&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: white;
        }

        .container {
            width: 95%;
            max-width: 450px;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-sizing: border-box;
        }

        h2 { 
            text-align: center; 
            margin-bottom: 25px; 
            font-weight: 600; 
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #fff;
        }

        .category-btn {
            width: 100%;
            padding: 18px;
            background: var(--primary-color);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 15px rgba(243, 156, 18, 0.3);
        }

        .category-btn:hover { 
            background: #e67e22; 
            transform: translateY(-2px);
        }

        .calc-window {
            display: none;
            margin-top: 25px;
            animation: slideDown 0.4s ease-out;
        }

        @keyframes slideDown { 
            from { opacity: 0; transform: translateY(-20px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        .input-group { margin-bottom: 18px; }
        
        label { 
            display: block; 
            margin-bottom: 8px; 
            font-size: 14px; 
            color: #efefef; 
            font-weight: 500;
        }
        
        input, select {
            width: 100%;
            padding: 14px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.3);
            background: rgba(255, 255, 255, 0.95);
            color: #222;
            box-sizing: border-box;
            font-size: 16px;
            outline: none;
        }

        input:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 8px rgba(243, 156, 18, 0.4);
        }

        .calculate-btn {
            width: 100%;
            padding: 15px;
            margin-top: 15px;
            background: #2ecc71;
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 17px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .calculate-btn:hover { background: #27ae60; }

        .results {
            margin-top: 25px;
            padding: 20px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 15px;
            display: none;
            border-left: 4px solid var(--primary-color);
        }

        .results p { 
            margin: 10px 0; 
            border-bottom: 1px solid rgba(255,255,255,0.1); 
            padding-bottom: 8px; 
            display: flex;
            justify-content: space-between;
            font-size: 15px;
        }
        
        .results span { 
            color: var(--primary-color); 
            font-weight: bold; 
        }

        .total-row {
            font-size: 18px !important;
            margin-top: 15px !important;
            border-bottom: none !important;
            color: #fff;
        }

    </style>
</head>
<body>

<div class="container">
    <h2>რემონტის ხარჯი</h2>

    <button class="category-btn" onclick="toggleWindow()">
        🧱 კედლის აშენება <span>▼</span>
    </button>

    <div id="wallWindow" class="calc-window">
        <div class="input-group">
            <label>კედლის სიგრძე (მეტრი)</label>
            <input type="number" id="length" step="0.1" placeholder="მაგ: 5.5">
        </div>
        <div class="input-group">
            <label>კედლის სიმაღლე (მეტრი)</label>
            <input type="number" id="height" step="0.1" placeholder="მაგ: 3.0">
        </div>
        <div class="input-group">
            <label>აირჩიეთ მასალა</label>
            <select id="material">
                <option value="0.08">ბლოკი (20x40)</option>
                <option value="0.015">აგური (სტანდარტული)</option>
            </select>
        </div>
        <div class="input-group">
            <label>ბლოკის/აგურის 1 ცალის ფასი (₾)</label>
            <input type="number" id="unitPrice" step="0.01" placeholder="მაგ: 1.80">
        </div>

        <button class="calculate-btn" onclick="calculateWall()">გამოთვლა</button>

        <div id="results" class="results">
            <p>კედლის ფართობი: <span id="resArea">0</span> მ²</p>
            <p>საჭირო რაოდენობა: <span id="resCount">0</span> ცალი</p>
            <p>მასალის ჯამური ფასი: <span id="resMaterialPrice">0</span> ₾</p>
            <p>ცემენტი (40კგ): <span id="resCement">0</span> მეშოკი</p>
            <p>ქვიშა: <span id="resSand">0</span> კუბი</p>
            <p>ხსნარის (ცემენტი+ქვიშა) ფასი: <span id="resMortarPrice">0</span> ₾</p>
            <p class="total-row"><strong>სულ ჯამი: <span id="resTotal">0</span> ₾</strong></p>
        </div>
    </div>
</div>

<script>
    function toggleWindow() {
        const win = document.getElementById('wallWindow');
        const btnSpan = document.querySelector('.category-btn span');
        if (win.style.display === 'block') {
            win.style.display = 'none';
            btnSpan.innerText = '▼';
        } else {
            win.style.display = 'block';
            btnSpan.innerText = '▲';
        }
    }

    function calculateWall() {
        const length = parseFloat(document.getElementById('length').value);
        const height = parseFloat(document.getElementById('height').value);
        const materialSize = parseFloat(document.getElementById('material').value);
        const unitPrice = parseFloat(document.getElementById('unitPrice').value) || 0;

        if (!length || !height) {
            alert("გთხოვთ, შეიყვანოთ კედლის ზომები!");
            return;
        }

        // 1. ფართობი
        const area = length * height;
        
        // 2. მასალის რაოდენობა (დაახლოებით 5% მარაგით)
        const count = Math.ceil(area / materialSize * 1.05);
        const materialTotalPrice = count * unitPrice;

        // 3. ხსნარის გათვლა 
        const sandVolume = (area * 0.025).toFixed(2); 
        const cementBags = Math.ceil(area * 0.25); 

        const sandPrice = sandVolume * 55;
        const cementPrice = cementBags * 17;
        const totalMortarPrice = sandPrice + cementPrice;

        const totalSum = materialTotalPrice + totalMortarPrice;

        // შედეგების გამოტანა
        document.getElementById('resArea').innerText = area.toFixed(2);
        document.getElementById('resCount').innerText = count;
        document.getElementById('resMaterialPrice').innerText = materialTotalPrice.toFixed(2);
        document.getElementById('resCement').innerText = cementBags;
        document.getElementById('resSand').innerText = sandVolume;
        document.getElementById('resMortarPrice').innerText = totalMortarPrice.toFixed(2);
        document.getElementById('resTotal').innerText = totalSum.toFixed(2);

        document.getElementById('results').style.display = 'block';
    }
</script>

</body>
</html>
