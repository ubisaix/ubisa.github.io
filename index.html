<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<title>კალკულატორი</title>

<style>
    body {
        font-family: Arial;
        background: #f4f6f9;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .calculator {
        background: #fff;
        padding: 25px;
        border-radius: 10px;
        width: 320px;
        box-shadow: 0 5px 20px rgba(0,0,0,0.1);
    }

    h2 {
        text-align: center;
        margin-bottom: 20px;
    }

    label {
        display: block;
        margin-top: 10px;
    }

    input {
        width: 100%;
        padding: 8px;
        margin-top: 5px;
        border-radius: 6px;
        border: 1px solid #ccc;
    }

    button {
        width: 100%;
        margin-top: 15px;
        padding: 10px;
        border: none;
        background: #007bff;
        color: white;
        font-size: 16px;
        border-radius: 6px;
        cursor: pointer;
    }

    button:hover {
        background: #0056b3;
    }

    .result {
        margin-top: 15px;
        font-weight: bold;
        text-align: center;
    }
</style>
</head>

<body>

<div class="calculator">
    <h2>კალკულატორი</h2>

    <label>თანხა:</label>
    <input type="number" id="amount" placeholder="შეიყვანე თანხა">

    <label>პროცენტი (%):</label>
    <input type="number" id="percent" placeholder="პროცენტი">

    <label>პერიოდი (თვე):</label>
    <input type="number" id="months" placeholder="თვეები">

    <button onclick="calculate()">გამოთვლა</button>

    <div class="result" id="result">შედეგი: 0</div>
</div>

<script>
function calculate() {
    let amount = parseFloat(document.getElementById('amount').value) || 0;
    let percent = parseFloat(document.getElementById('percent').value) || 0;
    let months = parseFloat(document.getElementById('months').value) || 0;

    let monthlyRate = percent / 100 / 12;

    let result;

    if(monthlyRate > 0){
        result = amount * monthlyRate / (1 - Math.pow(1 + monthlyRate, -months));
    } else {
        result = amount / months;
    }

    document.getElementById('result').innerText = 
        "თვიური გადასახადი: " + result.toFixed(2);
}
</script>

</body>
</html>
