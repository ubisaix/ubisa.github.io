<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real AI Image Generator</title>
    <style>
        :root {
            --bg: #0b0e14;
            --panel: #161b22;
            --accent: #7b2ff7;
            --text: #ffffff;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }

        .container { max-width: 800px; width: 100%; text-align: center; }

        h1 { font-size: 2.5rem; margin-bottom: 10px; background: linear-gradient(to right, #7b2ff7, #f107a3); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .input-section {
            background: var(--panel);
            padding: 30px;
            border-radius: 20px;
            border: 1px solid #30363d;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        input {
            width: 100%;
            padding: 15px;
            border-radius: 10px;
            border: 2px solid #30363d;
            background: #0d1117;
            color: white;
            font-size: 1.1rem;
            margin-bottom: 20px;
            box-sizing: border-box;
        }

        .options {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .style-btn {
            padding: 8px 15px;
            border-radius: 20px;
            border: 1px solid var(--accent);
            background: transparent;
            color: white;
            cursor: pointer;
            transition: 0.3s;
        }

        .style-btn.active { background: var(--accent); }

        .generate-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
            width: 100%;
        }

        .generate-btn:hover { opacity: 0.9; transform: scale(1.02); }
        .generate-btn:disabled { background: #444; cursor: not-allowed; }

        .result-section {
            margin-top: 30px;
            min-height: 400px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #outputImage {
            max-width: 100%;
            border-radius: 15px;
            box-shadow: 0 0 20px var(--accent);
            display: none;
            border: 2px solid #30363d;
        }

        .loader {
            border: 5px solid #f3f3f3;
            border-top: 5px solid var(--accent);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            display: none;
            margin-top: 50px;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .status-text { margin-top: 10px; color: #8b949e; display: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>AI Image Studio</h1>
    <p>ჩაწერე იდეა და AI მას რეალობად აქცევს</p>

    <div class="input-section">
        <input type="text" id="promptInput" placeholder="მაგალითად: Astronaut cat in deep space, cinematic...">
        
        <div class="options" id="styleOptions">
            <button class="style-btn" onclick="setStyle(this, 'Cyberpunk')">Cyberpunk</button>
            <button class="style-btn" onclick="setStyle(this, 'Anime')">Anime</button>
            <button class="style-btn" onclick="setStyle(this, 'Oil Painting')">Oil Painting</button>
            <button class="style-btn" onclick="setStyle(this, '3D Render')">3D Render</button>
            <button class="style-btn" onclick="setStyle(this, 'Realistic')">Realistic</button>
        </div>

        <button class="generate-btn" id="genBtn" onclick="generateImage()">სურათის შექმნა ✨</button>
    </div>

    <div class="result-section">
        <div class="loader" id="loader"></div>
        <div class="status-text" id="status">AI ფიქრობს და ხატავს...</div>
        <img src="" id="outputImage" alt="Generated AI Art">
    </div>
</div>

<script>
    let selectedStyle = "";

    function setStyle(btn, style) {
        document.querySelectorAll('.style-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        selectedStyle = style;
    }

    async function generateImage() {
        const prompt = document.getElementById('promptInput').value;
        const btn = document.getElementById('genBtn');
        const img = document.getElementById('outputImage');
        const loader = document.getElementById('loader');
        const status = document.getElementById('status');

        if (!prompt) {
            alert("გთხოვთ, ჩაწეროთ რაიმე აღწერა!");
            return;
        }

        // მომზადება
        btn.disabled = true;
        img.style.display = "none";
        loader.style.display = "block";
        status.style.display = "block";

        // პრომპტის აწყობა
        let finalPrompt = prompt;
        if (selectedStyle) {
            finalPrompt += `, in ${selectedStyle} style, high quality, 8k resolution`;
        }

        // Pollinations AI API-ს გამოყენება (ეს არის სრულიად უფასო და მუშაობს პირდაპირ ლინკით)
        const encodedPrompt = encodeURIComponent(finalPrompt);
        const imageUrl = `https://image.pollinations.ai/prompt/${encodedPrompt}?width=1024&height=1024&nologo=true&seed=${Math.floor(Math.random() * 100000)}`;

        // სურათის ჩატვირთვა
        const imageLoader = new Image();
        imageLoader.src = imageUrl;
        imageLoader.onload = () => {
            img.src = imageUrl;
            img.style.display = "block";
            loader.style.display = "none";
            status.style.display = "none";
            btn.disabled = false;
        };
        
        imageLoader.onerror = () => {
            alert("შეცდომა გენერაციისას. სცადეთ მოგვიანებით.");
            loader.style.display = "none";
            status.style.display = "none";
            btn.disabled = false;
        };
    }
</script>

</body>
</html>
