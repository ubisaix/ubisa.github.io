<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Search Pro</title>

<style>
:root {
  --bg: #f1f3f4;
  --text: #000;
  --box: #fff;
}

body.dark {
  --bg: #181818;
  --text: #fff;
  --box: #242424;
}

body {
  font-family: Arial;
  background: var(--bg);
  color: var(--text);
  text-align: center;
  padding: 20px;
  transition: 0.3s;
}

h1 {
  font-size: 32px;
}

input {
  width: 90%;
  max-width: 500px;
  padding: 12px;
  border-radius: 25px;
  border: 1px solid #ccc;
}

button {
  margin: 5px;
  padding: 10px 15px;
  border-radius: 20px;
  border: none;
  cursor: pointer;
  background: #4285f4;
  color: white;
}

#chat {
  margin-top: 30px;
  max-width: 600px;
  margin-inline: auto;
  text-align: left;
}

.msg {
  background: var(--box);
  padding: 10px;
  border-radius: 10px;
  margin: 5px 0;
}

.user { background: #d2e3fc; }
.ai { background: #e6f4ea; }

.gcse-search {
  margin-top: 40px;
}
</style>

<script async src="https://cse.google.com/cse.js?cx=YOUR_CX_ID"></script>

</head>
<body>

<h1>🔍 Smart Search Pro</h1>

<input id="query" placeholder="დაწერე ან ილაპარაკე...">
<br>

<button onclick="send()">🔎 ძიება</button>
<button onclick="voice()">🎤 ხმა</button>
<button onclick="toggleDark()">🌙 Dark</button>

<div id="chat"></div>

<div class="gcse-search"></div>

<script>
const chat = document.getElementById("chat");

document.getElementById("query").addEventListener("keypress", function(e) {
  if (e.key === "Enter") send();
});

function addMessage(text, cls) {
  const div = document.createElement("div");
  div.className = "msg " + cls;
  div.innerText = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

async function send() {
  const input = document.getElementById("query");
  const text = input.value;
  if (!text) return;

  addMessage("👤 " + text, "user");
  input.value = "";

  addMessage("⏳ ფიქრი...", "ai");

  try {
    const res = await fetch("https://api.openai.com/v1/chat/completions", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer YOUR_OPENAI_API_KEY"
      },
      body: JSON.stringify({
        model: "gpt-4o-mini",
        messages: [{ role: "user", content: text }]
      })
    });

    const data = await res.json();
    const reply = data.choices[0].message.content;

    chat.lastChild.remove();
    addMessage("🤖 " + reply, "ai");

  } catch {
    chat.lastChild.remove();
    addMessage("❌ შეცდომა", "ai");
  }
}

// 🎤 Voice Search
function voice() {
  const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
  recognition.lang = "ka-GE";
  recognition.start();

  recognition.onresult = function(event) {
    document.getElementById("query").value = event.results[0][0].transcript;
  };
}

// 🌙 Dark Mode
function toggleDark() {
  document.body.classList.toggle("dark");
}
</script>

</body>
</html>
