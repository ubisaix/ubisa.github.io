<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UBISA.GE | Recipes & Stats</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --fiber-green: #2d5a27;
            --text-dark: #111827;
            --text-gray: #6b7280;
            --bg-light: #ffffff;
            --border: #f3f4f6;
            --font-main: 'Inter', sans-serif;
        }

        body {
            font-family: var(--font-main);
            margin: 0;
            padding: 0;
            background-color: var(--bg-light);
            color: var(--text-dark);
            -webkit-font-smoothing: antialiased;
        }

        header {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px 0 10px 0;
            background: white;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo { 
            font-weight: 800; 
            font-size: 32px; 
            color: var(--fiber-green); 
            cursor: pointer; 
            margin-bottom: 25px;
            letter-spacing: -1.5px;
        }

        .nav-links { 
            display: flex; 
            gap: 25px; 
            font-size: 13px; 
            font-weight: 600; 
            color: var(--text-gray);
            text-transform: uppercase;
            overflow-x: auto;
            max-width: 95%;
            padding: 10px 0;
            scrollbar-width: none;
        }

        .nav-links::-webkit-scrollbar { display: none; }
        
        .nav-links span {
            white-space: nowrap;
            cursor: pointer;
            transition: all 0.2s;
            padding-bottom: 5px;
            border-bottom: 2px solid transparent;
        }

        .nav-links span:hover, .nav-links span.active { 
            color: var(--fiber-green); 
            border-bottom: 2px solid var(--fiber-green);
        }

        .container { max-width: 1200px; margin: 40px auto; padding: 0 20px; }
        .main-title { font-size: 36px; font-weight: 800; margin-bottom: 40px; letter-spacing: -1px; }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 24px;
        }

        .card {
            position: relative;
            height: 340px;
            border-radius: 20px;
            overflow: hidden;
            background: #000;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        .card:hover { transform: translateY(-8px); box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
        .card img { width: 100%; height: 100%; object-fit: cover; opacity: 0.85; transition: 0.5s; }
        .card:hover img { opacity: 1; transform: scale(1.05); }

        .card-content {
            position: absolute;
            bottom: 0; left: 0; width: 100%;
            padding: 25px;
            background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
            color: white;
            box-sizing: border-box;
        }

        .item-name { font-size: 17px; font-weight: 700; text-transform: uppercase; margin-bottom: 8px; }

        .item-stats {
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 12px;
            font-weight: 500;
            opacity: 0.9;
        }

        .stat-group {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .stat-icon {
            width: 14px;
            height: 14px;
            filter: brightness(0) invert(1);
        }

        /* PAGINATION STYLES */
        .pagination {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 50px;
        }

        .page-num {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            background: #f3f4f6;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
            color: var(--text-dark);
        }

        .page-num.active {
            background: var(--fiber-green);
            color: white;
        }

        .page-num:hover:not(.active) {
            background: #e5e7eb;
        }

        /* RECIPE PAGE */
        #recipe-page { display: none; animation: slideIn 0.4s ease-out; }
        @keyframes slideIn { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .recipe-header { display: grid; grid-template-columns: 1fr 1fr; gap: 60px; }
        .recipe-img { width: 100%; height: 550px; border-radius: 24px; object-fit: cover; }
        
        .recipe-details h2 { font-size: 48px; font-weight: 800; margin-top: 0; color: var(--text-dark); }
        .info-bar { display: flex; gap: 40px; margin: 30px 0; border-top: 1px solid #eee; border-bottom: 1px solid #eee; padding: 20px 0; }
        .info-item b { display: block; font-size: 20px; color: var(--fiber-green); font-weight: 800; }
        .info-item span { font-size: 13px; color: var(--text-gray); }

        .ingredients-list { list-style: none; padding: 0; line-height: 2.5; font-size: 16px; }
        .ingredients-list li::before { content: "→"; color: var(--fiber-green); margin-right: 10px; font-weight: bold; }

        .back-btn { 
            background: #f3f4f6; border: none; padding: 12px 24px; 
            border-radius: 12px; cursor: pointer; font-weight: 600; margin-bottom: 30px; 
            font-size: 14px; transition: 0.2s;
        }
        .back-btn:hover { background: #e5e7eb; }

        footer { border-top: 1px solid var(--border); padding: 80px 8%; margin-top: 100px; display: grid; grid-template-columns: 2fr repeat(3, 1fr); gap: 40px; }
        footer h4 { color: var(--fiber-green); font-size: 12px; text-transform: uppercase; margin-bottom: 25px; }
        footer ul { list-style: none; padding: 0; font-size: 14px; color: var(--text-gray); line-height: 2.5; }

        @media (max-width: 1000px) {
            .menu-grid { grid-template-columns: repeat(2, 1fr); }
            .recipe-header { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<header>
    <div class="logo" onclick="goHome()">ჩვენი გემრიელი რეცეპტები</div>
    <div class="nav-links" id="category-menu">
        <span onclick="filterJokes('ყველა', this)" class="active">ყველა</span>
        <span onclick="filterJokes('კერძები', this)">კერძები</span>
        <span onclick="filterJokes('სალათები', this)">სალათები</span>
        <span onclick="filterJokes('ცომეული', this)">ცომეული</span>
        <span onclick="filterJokes('წვნიანები', this)">წვნიანები</span>
        <span onclick="filterJokes('სენდვიჩები', this)">სენდვიჩები</span>
        <span onclick="filterJokes('ნამცხვრები', this)">ნამცხვრები</span>
        <span onclick="filterJokes('ტორტები', this)">ტორტები</span>
        <span onclick="filterJokes('დესერტები', this)">დესერტები</span>
        <span onclick="filterJokes('სოუსები', this)">სოუსები</span>
    </div>
</header>

<div class="container" id="main-content">
    <h1 class="main-title" id="page-title">ყველა რეცეპტი</h1>
    <div class="menu-grid" id="grid-container"></div>
    <div class="pagination" id="pagination"></div>
</div>

<div class="container" id="recipe-page">
    <button class="back-btn" onclick="goHome()">← მთავარზე</button>
    <div id="recipe-content" class="recipe-header"></div>
</div>

<footer>
    <div><div class="logo">fiber</div><p style="color:var(--text-gray); font-size:14px;">ხარისხიანი რეცეპტების პლატფორმა.</p></div>
    <div><h4>ნავიგაცია</h4><ul><li>მთავარი</li><li>კერძები</li></ul></div>
    <div><h4>კომპანია</h4><ul><li>ჩვენ შესახებ</li><li>კონტაქტი</li></ul></div>
    <div><h4>სამართლებრივი</h4><ul><li>წესები</li><li>Privacy</li></ul></div>
</footer>

<script>
    const data = [
        { id: 1, cat: "კერძები", name: "ქაბაბი", time: "40 წთ", views: "1.2k", img: "https://fiber.ge/wp-content/uploads/kababis-recepti.webp", ing: ["1 კგ საქონლის ფარში", "3 ხახვი", "6 კბილი ნიორი", "2 ჩ/კ დაფქული ქინძი", "2 ჩ/კ დაფქული ძირა", "2 ჩ/კ პაპრიკა", "3 ჩ/კ ზღვის მარილი", "1/2 ჩ/კ კაიენის წიწაკა","1/2 ჭიქა დაჭრილი ქინძი","პილპილი"], text: "დიდ თასში მოათავსეთ ფარში..." },
        { id: 2, cat: "კერძები", name: "წიწიბურას კატლეტი", time: "30 წთ", views: "1.7k", img: "https://fiber.ge/wp-content/uploads/tsitsiburas-katletis-recepti.webp", ing: ["1 ჭიქა წიწიბურა", "1/2 ჭიქა საფანელი", "1 სტაფილო", "1 კარტოფილი", "1 კონა ქინძი", "1 ბულგარული წიწაკა", "მარილი, პილპილი"], text: "ჯერ მოხარშეთ წიწიბურა..." },
        { id: 3, cat: "კერძები", name: "მადამ ბოვარი", time: "1 სთ 45 წთ", views: "1.1k", img: "https://fiber.ge/wp-content/uploads/madam-bovaris-recepti.webp", ing: ["1 კგ კარტოფილი", "650 გრ შერეული ფარში", "200 გრ ყველი", "200 გრ მაიონეზი", "2 კვერცხი", "1 ხახვი", "1 კბილი ნიორი", "მარილი და პილპილი"], text: "გარეცხეთ და გათალეთ კარტოფილი..." },
        { id: 4, cat: "კერძები", name: "ლაზანია", time: "1სთ 30წთ", views: "1.2k", img: "https://fiber.ge/wp-content/uploads/lazanias-recepti.webp", ing: ["ფირფიტა", "ფარში", "ყველი"], text: "საქონლის ფარში მოათავსეთ..." },
        // ... დამატებითი რეცეპტები (ტესტისთვის დავაკოპირებ რომ 16-ს გასცდეს)
        { id: 5, cat: "წვნიანები", name: "სოკოს კრემ-სუპი", time: "40 წთ", views: "1.1k", img: "https://images.unsplash.com/photo-1547592166-23ac45744acd?w=800", ing: ["სოკო", "ნაღები"], text: "დააბლენდერეთ..." },
        { id: 6, cat: "ტორტები", name: "შოკოლადის ტორტი", time: "90 წთ", views: "2.5k", img: "https://images.unsplash.com/photo-1578985545062-69928b1d9587?w=800", ing: ["შოკოლადი"], text: "გამოაცხვეთ..." },
        { id: 7, cat: "სალათები", name: "მწვანე სალათი", time: "15 წთ", views: "850", img: "https://images.unsplash.com/photo-1512621776951-a57141f2eefd?w=800", ing: ["ავოკადო"], text: "აურიეთ..." },
        { id: 8, cat: "ნამცხვრები", name: "კენკრის ჩიზქეიქი", time: "120 წთ", views: "3.1k", img: "https://images.unsplash.com/photo-1565958011703-44f9829ba187?w=800", ing: ["ყველი"], text: "გააცივეთ..." },
        { id: 9, cat: "ცომეული", name: "იმერული ხაჭაპური", time: "30 წთ", views: "4.8k", img: "https://images.unsplash.com/photo-1608039829572-7852bf5c7c6a?w=800", ing: ["ყველი"], text: "გამოაცხვეთ..." },
        { id: 10, cat: "სენდვიჩები", name: "კლუბ სენდვიჩი", time: "10 წთ", views: "920", img: "https://images.unsplash.com/photo-1528735602780-2552fd46c7af?w=800", ing: ["პური"], text: "მიირთვით..." },
        { id: 11, cat: "სოუსები", name: "პესტოს სოუსი", time: "5 წთ", views: "640", img: "https://images.unsplash.com/photo-1473093226795-af9932fe5856?w=800", ing: ["რეჰანი"], text: "დააბლენდერეთ..." },
        { id: 12, cat: "კერძები", name: "კერძი 12", time: "20 წთ", views: "1k", img: "https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=800", ing: ["ინგრედიენტი"], text: "ტექსტი..." },
        { id: 13, cat: "კერძები", name: "კერძი 13", time: "20 წთ", views: "1k", img: "https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=800", ing: ["ინგრედიენტი"], text: "ტექსტი..." },
        { id: 14, cat: "კერძები", name: "კერძი 14", time: "20 წთ", views: "1k", img: "https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=800", ing: ["ინგრედიენტი"], text: "ტექსტი..." },
        { id: 15, cat: "კერძები", name: "კერძი 15", time: "20 წთ", views: "1k", img: "https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=800", ing: ["ინგრედიენტი"], text: "ტექსტი..." },
        { id: 16, cat: "კერძები", name: "კერძი 16", time: "20 წთ", views: "1k", img: "https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=800", ing: ["ინგრედიენტი"], text: "ტექსტი..." },
        { id: 17, cat: "კერძები", name: "კერძი 17 (მე-2 გვერდი)", time: "20 წთ", views: "1k", img: "https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=800", ing: ["ინგრედიენტი"], text: "ეს უკვე მეორე გვერდზეა!" }
    ];

    let currentPage = 1;
    const itemsPerPage = 16;
    let filteredData = [...data];

    function renderCards() {
        const grid = document.getElementById('grid-container');
        grid.innerHTML = "";
        
        // გამოთვლა რომელი ინდექსიდან რომელზე უნდა გამოჩნდეს
        const start = (currentPage - 1) * itemsPerPage;
        const end = start + itemsPerPage;
        const paginatedItems = filteredData.slice(start, end);

        paginatedItems.forEach(item => {
            const card = document.createElement('div');
            card.className = 'card';
            card.onclick = () => openRecipe(item.id);
            card.innerHTML = `
                <img src="${item.img}">
                <div class="card-content">
                    <div class="item-name">${item.name}</div>
                    <div class="item-stats">
                        <div class="stat-group">
                            <img src="https://fiber.ge/wp-content/uploads/time-icon.svg" class="stat-icon">
                            <span>${item.time}</span>
                        </div>
                        <div class="stat-group">
                            <img src="https://fiber.ge/wp-content/uploads/portion-icon.svg" class="stat-icon">
                            <span>${item.views}</span>
                        </div>
                    </div>
                </div>
            `;
            grid.appendChild(card);
        });

        renderPagination();
    }

    function renderPagination() {
        const paginationContainer = document.getElementById('pagination');
        paginationContainer.innerHTML = "";
        const pageCount = Math.ceil(filteredData.length / itemsPerPage);

        if (pageCount <= 1) return; // თუ ერთ გვერდზე ეტევა, არ გამოვაჩინოთ ნუმერაცია

        for (let i = 1; i <= pageCount; i++) {
            const pageBtn = document.createElement('div');
            pageBtn.className = `page-num ${i === currentPage ? 'active' : ''}`;
            pageBtn.innerText = i;
            pageBtn.onclick = () => {
                currentPage = i;
                renderCards();
                window.scrollTo(0, 0);
            };
            paginationContainer.appendChild(pageBtn);
        }
    }

    function filterJokes(category, el) {
        goHome();
        currentPage = 1; // ფილტრისას ყოველთვის პირველ გვერდზე დავბრუნდეთ
        
        document.querySelectorAll('.nav-links span').forEach(s => s.classList.remove('active'));
        el.classList.add('active');
        document.getElementById('page-title').innerText = category === 'ყველა' ? 'ყველა რეცეპტი' : category;

        if (category === 'ყველა') {
            filteredData = [...data];
        } else {
            filteredData = data.filter(item => item.cat === category);
        }
        renderCards();
    }

    function openRecipe(id) {
        const item = data.find(x => x.id === id);
        if(!item) return;

        document.getElementById('main-content').style.display = 'none';
        const page = document.getElementById('recipe-page');
        const content = document.getElementById('recipe-content');
        page.style.display = 'block';
        window.scrollTo(0,0);

        content.innerHTML = `
            <img src="${item.img}" class="recipe-img">
            <div>
                <h2>${item.name}</h2>
                <div class="info-bar">
                    <div class="info-item"><b>${item.time}</b><span>მომზადება</span></div>
                    <div class="info-item"><b>${item.views}</b><span>ნახვები</span></div>
                    <div class="info-item"><b>${item.cat}</b><span>კატეგორია</span></div>
                </div>
                <h3>ინგრედიენტები</h3>
                <ul class="ingredients-list">${item.ing.map(i => `<li>${i}</li>`).join('')}</ul>
                <h3 style="margin-top:40px">მომზადება</h3>
                <p style="line-height:1.9; color:#4b5563; font-size:16px;">${item.text}</p>
            </div>
        `;
    }

    function goHome() {
        document.getElementById('recipe-page').style.display = 'none';
        document.getElementById('main-content').style.display = 'block';
    }

    // საწყისი ჩატვირთვა
    renderCards();
</script>

</body>
</html>
