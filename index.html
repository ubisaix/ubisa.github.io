<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ქართული ინტერაქციული კროსვორდი</title>
    <style>
        :root {
            --bg-image: url('https://images.unsplash.com/photo-1523731407965-2430cd12f5e4?auto=format&fit=crop&q=80&w=1920');
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), var(--bg-image);
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: white;
            transition: background 0.5s ease;
        }

        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 15px;
            margin-top: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            max-width: 900px;
            width: 95%;
            text-align: center;
        }

        .menu {
            margin-bottom: 20px;
        }

        select {
            padding: 10px;
            font-size: 16px;
            border-radius: 5px;
            background: white;
            cursor: pointer;
        }

        .game-area {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
        }

        #crossword-grid {
            display: grid;
            gap: 2px;
            background: #444;
            padding: 5px;
            border-radius: 5px;
            margin: 0 auto;
        }

        .cell {
            width: 40px;
            height: 40px;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .cell.black {
            background: #222;
        }

        .cell input {
            width: 100%;
            height: 100%;
            border: none;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
            text-transform: uppercase;
            background: transparent;
        }

        .cell .number {
            position: absolute;
            top: 2px;
            left: 2px;
            font-size: 10px;
            color: #555;
        }

        .clues {
            text-align: left;
            background: rgba(0,0,0,0.3);
            padding: 15px;
            border-radius: 10px;
        }

        .clues h3 { margin-top: 0; border-bottom: 1px solid #fff; }

        .success-msg {
            color: #4CAF50;
            font-weight: bold;
            margin-top: 10px;
            display: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>ქართული კროსვორდი</h1>
    
    <div class="menu">
        <label>აირჩიეთ თემა: </label>
        <select id="themeSelect" onchange="loadGame()">
            <option value="geography">საქართველოს გეოგრაფია</option>
            <option value="food">ქართული სამზარეულო</option>
        </select>
    </div>

    <div class="game-area">
        <div id="crossword-grid"></div>
        
        <div class="clues">
            <h3>მინიშნებები</h3>
            <div id="clue-list"></div>
            <button onclick="checkAnswers()" style="margin-top:20px; padding: 10px 20px; cursor:pointer;">შემოწმება</button>
            <p id="message" class="success-msg">გილოცავთ! სწორია!</p>
        </div>
    </div>
</div>

<script>
    const themes = {
        geography: {
            bg: "https://images.unsplash.com/photo-1565008447742-97f6f38c985c?q=80&w=1920",
            size: 7,
            clues: [
                { num: 1, q: "საქართველოს დედაქალაქი (ჰორ.)", a: "თბილისი", x: 0, y: 1, dir: "h" },
                { num: 2, q: "ქალაქი ზღვისპირეთში (ვერტ.)", a: "ბათუმი", x: 1, y: 0, dir: "v" }
            ]
        },
        food: {
            bg: "https://images.unsplash.com/photo-1610614819513-58e34989848b?q=80&w=1920",
            size: 8,
            clues: [
                { num: 1, q: "ყველაზე პოპულარული ცომეული (ჰორ.)", a: "ხაჭაპური", x: 0, y: 2, dir: "h" },
                { num: 2, q: "მთიულური წარმოშობის ნობათი (ვერტ.)", a: "ხინკალი", x: 0, y: 2, dir: "v" }
            ]
        }
    };

    function loadGame() {
        const themeKey = document.getElementById('themeSelect').value;
        const theme = themes[themeKey];
        const grid = document.getElementById('crossword-grid');
        const clueList = document.getElementById('clue-list');
        const message = document.getElementById('message');
        
        // ფონის შეცვლა
        document.documentElement.style.setProperty('--bg-image', `url('${theme.bg}')`);
        message.style.display = 'none';
        
        // ბადის გასუფთავება
        grid.innerHTML = '';
        clueList.innerHTML = '';
        grid.style.gridTemplateColumns = `repeat(${theme.size}, 40px)`;

        // ბადის შექმნა
        const cells = Array(theme.size).fill().map(() => Array(theme.size).fill(null));

        theme.clues.forEach(c => {
            clueList.innerHTML += `<p><strong>${c.num}.</strong> ${c.q}</p>`;
            for (let i = 0; i < c.a.length; i++) {
                let currX = c.dir === 'h' ? c.x + i : c.x;
                let currY = c.dir === 'v' ? c.y + i : c.y;
                cells[currY][currX] = { char: c.a[i], num: i === 0 ? c.num : null };
            }
        });

        for (let y = 0; y < theme.size; y++) {
            for (let x = 0; x < theme.size; x++) {
                const cellDiv = document.createElement('div');
                cellDiv.className = 'cell' + (cells[y][x] ? '' : ' black');
                
                if (cells[y][x]) {
                    if (cells[y][x].num) {
                        cellDiv.innerHTML += `<span class="number">${cells[y][x].num}</span>`;
                    }
                    const input = document.createElement('input');
                    input.maxLength = 1;
                    input.dataset.answer = cells[y][x].char;
                    cellDiv.appendChild(input);
                }
                grid.appendChild(cellDiv);
            }
        }
    }

    function checkAnswers() {
        const inputs = document.querySelectorAll('.cell input');
        let allCorrect = true;
        inputs.forEach(input => {
            if (input.value.toLowerCase() === input.dataset.answer.toLowerCase()) {
                input.style.color = "#4CAF50";
            } else {
                input.style.color = "red";
                allCorrect = false;
            }
        });
        if (allCorrect) document.getElementById('message').style.display = 'block';
    }

    // პირველი ჩატვირთვა
    loadGame();
</script>

</body>
</html>
