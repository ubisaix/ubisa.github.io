<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fiber.ge Style | Recipes</title>
    <style>
        /* Fiber-ის იდენტური შრიფტები და ფერები */
        :root {
            --fiber-green: #2d5a27;
            --text-dark: #1a1a1a;
            --text-gray: #717171;
            --bg-light: #fdfdfd;
            --border: #f1f1f1;
            /* სისტემური შრიფტი, რომელიც მაქსიმალურად ჰგავს ფიბერის სტილს */
            --font-main: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        body {
            font-family: var(--font-main);
            margin: 0;
            padding: 0;
            background-color: var(--bg-light);
            color: var(--text-dark);
            -webkit-font-smoothing: antialiased;
        }

        /* HEADER */
        header {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 0;
            background: white;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo { 
            font-weight: 800; 
            font-size: 28px; 
            color: var(--fiber-green); 
            cursor: pointer; 
            margin-bottom: 20px;
            letter-spacing: -1px;
        }

        /* ახალი კატეგორიების მენიუ */
        .nav-links { 
            display: flex; 
            gap: 20px; 
            font-size: 13px; 
            font-weight: 600; 
            color: var(--text-gray);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            overflow-x: auto;
            max-width: 90%;
            padding-bottom: 5px;
        }
        
        .nav-links span {
            white-space: nowrap;
            transition: color 0.2s;
            cursor: pointer;
        }

        .nav-links span:hover { 
            color: var(--fiber-green); 
        }

        /* MAIN CONTENT */
        .container { max-width: 1200px; margin: 40px auto; padding: 0 20px; }
        .main-title { font-size: 32px; font-weight: 800; margin-bottom: 40px; }

        /* GRID */
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
        }

        /* CARD */
        .card {
            position: relative;
            height: 320px;
            border-radius: 15px;
            overflow: hidden;
            background: #000;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .card:hover { transform: translateY(-5px); }
        .card img { width: 100%; height: 100%; object-fit: cover; opacity: 0.8; transition: 0.4s; }
        .card:hover img { opacity: 1; }

        .card-content {
            position: absolute;
            bottom: 0; left: 0; width: 100%;
            padding: 20px;
            background: linear-gradient(transparent, rgba(0,0,0,0.9));
            color: white;
            box-sizing: border-box;
        }

        .item-name { font-size: 15px; font-weight: 700; text-transform: uppercase; margin-bottom: 5px; }
        .item-meta { font-size: 11px; opacity: 0.8; display: flex; gap: 10px; }

        /* RECIPE PAGE */
        #recipe-page { display: none; animation: fadeIn 0.4s ease; margin-top: 20px; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .recipe-header { display: grid; grid-template-columns: 1fr 1.2fr; gap: 40px; }
        .recipe-img { width: 100%; height: 450px; border-radius: 15px; object-fit: cover; }
        
        .recipe-details h2 { font-size: 36px; margin-top: 0; color: var(--text-dark); }
        .info-bar { display: flex; gap: 20px; margin: 25px 0; border-y: 1px solid #eee; padding: 15px 0; border-top: 1px solid #eee; border-bottom: 1px solid #eee;}
        .info-item b { display: block; font-size: 16px; color: var(--fiber-green); }
        .info-item span { font-size: 12px; color: var(--text-gray); }

        .ingredients-list { list-style: none; padding: 0; line-height: 2.2; color: #444; font-size: 15px; }
        .ingredients-list li::before { content: "•"; color: var(--fiber-green); font-weight: bold; display: inline-block; width: 1em; }

        .back-btn { 
            background: white; border: 1px solid #ddd; padding: 8px 18px; 
            border-radius: 8px; cursor: pointer; font-weight: 600; margin-bottom: 25px; 
            font-size: 13px;
        }

        /* FOOTER */
        footer { border-top: 1px solid var(--border); padding: 60px 8%; margin-top: 80px; display: grid; grid-template-columns: 2fr repeat(3, 1fr); gap: 30px; }
        footer h4 { color: var(--fiber-green); font-size: 12px; text-transform: uppercase; margin-bottom: 20px; }
        footer ul { list-style: none; padding: 0; font-size: 13px; color: var(--text-gray); line-height: 2; }

        @media (max-width: 1000px) {
            .menu-grid { grid-template-columns: repeat(2, 1fr); }
            .recipe-header { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<header>
    <div class="logo" onclick="goHome()">fiber</div>
    <div class="nav-links">
        <span>კერძები</span>
        <span>სალათები</span>
        <span>ცომეული</span>
        <span>წვნიანები</span>
        <span>სენდვიჩები</span>
        <span>ნამცხვრები</span>
        <span>ტორტები</span>
        <span>დესერტები</span>
        <span>სოუსები</span>
    </div>
</header>

<div class="container" id="main-content">
    <h1 class="main-title">რეცეპტები</h1>
    <div class="menu-grid" id="grid-container">
        </div>
</div>

<div class="container" id="recipe-page">
    <button class="back-btn" onclick="goHome()">← უკან დაბრუნება</button>
    <div id="recipe-content" class="recipe-header"></div>
</div>

<footer>
    <div><div class="logo">fiber</div><p style="color:var(--text-gray); font-size:13px;">გემრიელი რეცეპტების ციფრული ბიბლიოთეკა.</p></div>
    <div><h4>ნავიგაცია</h4><ul><li>მთავარი</li><li>რესტორნები</li></ul></div>
    <div><h4>კომპანია</h4><ul><li>ჩვენს შესახებ</li><li>კონტაქტი</li></ul></div>
    <div><h4>წესები</h4><ul><li>Privacy Policy</li><li>Terms</li></ul></div>
</footer>

<script>
    // მონაცემების ბაზა
    const data = [
        {
            id: 1,
            name: "ქაბაბი კლასიკური",
            time: "45 წთ",
            cal: "520 კკალ",
            img: "https://images.unsplash.com/photo-1628191139360-408a06f913fb?auto=format&fit=crop&w=800",
            ing: ["საქონლის ხორცი - 1კგ", "ხახვი - 2 ცალი", "კოწახური", "მარილი", "წიწაკა"],
            text: "ხორცი კარგად დაამუშავეთ, შეურიეთ წვრილად დაჭრილი ხახვი და სუნელები. შეწვით ნაკვერჩხალზე ან ტაფაზე ოქროსფერ შეფერილობამდე."
        },
        {
            id: 2,
            name: "კენკრის ნამცხვარი",
            time: "60 წთ",
            cal: "310 კკალ",
            img: "https://images.unsplash.com/photo-1565958011703-44f9829ba187?auto=format&fit=crop&w=800",
            ing: ["ფქვილი - 500გრ", "კვერცხი - 3 ცალი", "ნაღები", "ახალი კენკრა", "შაქარი"],
            text: "მოამზადეთ ჰაეროვანი ცომი, დაამატეთ კენკრის მიქსი და გამოაცხვეთ 180 გრადუსზე 45 წუთის განმავლობაში."
        },
        {
            id: 3,
            name: "მწვანე სალათი",
            time: "10 წთ",
            cal: "150 კკალ",
            img: "https://images.unsplash.com/photo-1512621776951-a57141f2eefd?auto=format&fit=crop&w=800",
            ing: ["ავოკადო", "სალათის ფოთლები", "ზეითუნის ზეთი", "კიტრი", "თხილი"],
            text: "ყველა ინგრედიენტი დაჭერით სასურველ ზომაზე, მოასხით ზეითუნის ზეთი და ლიმონის წვენი."
        },
        {
            id: 4,
            name: "შოკოლადის ტორტი",
            time: "90 წთ",
            cal: "650 კკალ",
            img: "https://images.unsplash.com/photo-1578985545062-69928b1d9587?auto=format&fit=crop&w=800",
            ing: ["შავი შოკოლადი", "კარაქი", "ფქვილი", "შაქრის პუდრა"],
            text: "გაადნეთ შოკოლადი და კარაქი, შეურიეთ მშრალ ინგრედიენტებს და გამოაცხვეთ. მორთეთ შოკოლადის განაშით."
        }
    ];

    function loadHome() {
        const grid = document.getElementById('grid-container');
        grid.innerHTML = "";
        data.forEach(item => {
            const card = document.createElement('div');
            card.className = 'card';
            card.onclick = () => openRecipe(item.id);
            card.innerHTML = `
                <img src="${item.img}">
                <div class="card-content">
                    <div class="item-name">${item.name}</div>
                    <div class="item-meta"><span>🕒 ${item.time}</span><span>🔥 ${item.cal}</span></div>
                </div>
            `;
            grid.appendChild(card);
        });
    }

    function openRecipe(id) {
        const item = data.find(x => x.id === id);
        document.getElementById('main-content').style.display = 'none';
        const page = document.getElementById('recipe-page');
        const content = document.getElementById('recipe-content');
        page.style.display = 'block';
        window.scrollTo(0,0);

        content.innerHTML = `
            <img src="${item.img}" class="recipe-img">
            <div>
                <h2>${item.name}</h2>
                <div class="info-bar">
                    <div class="info-item"><b>${item.time}</b><span>დრო</span></div>
                    <div class="info-item"><b>${item.cal}</b><span>კალორია</span></div>
                    <div class="info-item"><b>მარტივი</b><span>სირთულე</span></div>
                </div>
                <h3>ინგრედიენტები</h3>
                <ul class="ingredients-list">
                    ${item.ing.map(i => `<li>${i}</li>`).join('')}
                </ul>
                <h3 style="margin-top:30px">მომზადების წესი</h3>
                <p style="line-height:1.8; color:#555">${item.text}</p>
            </div>
        `;
    }

    function goHome() {
        document.getElementById('recipe-page').style.display = 'none';
        document.getElementById('main-content').style.display = 'block';
    }

    loadHome();
</script>

</body>
</html>
