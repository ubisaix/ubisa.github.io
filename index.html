<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ფასების შედარება - Google Sheets-დან</title>
    <style>
        body { font-family: 'Helvetica', sans-serif; background: #f4f7f6; padding: 20px; color: #333; }
        .container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); }
        h2 { text-align: center; color: #2c3e50; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; border-bottom: 1px solid #eee; text-align: left; }
        th { background-color: #f8f9fa; color: #555; }
        .price-tag { color: #e74c3c; font-weight: bold; font-size: 1.1em; }
        .refresh-btn { display: block; width: 200px; margin: 20px auto; padding: 10px; background: #27ae60; color: white; border: none; border-radius: 5px; cursor: pointer; text-align: center; }
        .refresh-btn:hover { background: #219150; }
    </style>
</head>
<body>

<div class="container">
    <h2>მშენებლობის ფასების მონიტორინგი</h2>
    <button class="refresh-btn" onclick="fetchSheetData()">მონაცემების განახლება</button>
    
    <table id="priceTable">
        <thead>
            <tr>
                <th>პროდუქტი</th>
                <th>მაღაზია</th>
                <th>ფასი</th>
            </tr>
        </thead>
        <tbody>
            </tbody>
    </table>
</div>

<script>
    // აქ ჩასვით თქვენი "Publish to web" CSV ლინკი
    const sheetLink = "თქვენი_CSV_ლინკი_აქ"; 

    async function fetchSheetData() {
        try {
            const response = await fetch(sheetLink);
            const data = await response.text();
            
            // CSV მონაცემების დაყოფა ხაზებად
            const rows = data.split('\n').slice(1); // პირველი ხაზის (Header) გამოტოვება
            const tableBody = document.querySelector('#priceTable tbody');
            tableBody.innerHTML = ''; 

            rows.forEach(row => {
                const cols = row.split(',');
                if (cols.length >= 2) {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${cols[0] || 'პროდუქტი'}</td>
                        <td>Gorgia</td>
                        <td class="price-tag">${cols[1]} ₾</td>
                    `;
                    tableBody.appendChild(tr);
                }
            });
        } catch (error) {
            console.error("შეცდომა მონაცემების წაკითხვისას:", error);
            alert("შეცდომა! დარწმუნდით, რომ ლინკი სწორია და ცხრილი გამოქვეყნებულია.");
        }
    }

    // გვერდის ჩატვირთვისას ავტომატურად წამოიღოს მონაცემები
    window.onload = fetchSheetData;
</script>

</body>
</html>
