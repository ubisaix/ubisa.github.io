<!DOCTYPE html>
<html lang="ka">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fiber - კერძები</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; }
    .card { transition: all 0.2s; }
    .card:hover { transform: translateY(-4px); box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1); }
  </style>
</head>
<body class="bg-gray-50">

  <!-- Header -->
  <header class="bg-white border-b sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
      <div class="flex items-center gap-8">
        <div class="text-2xl font-bold text-orange-500">fiber</div>
        <nav class="flex gap-6 text-sm font-medium">
          <a href="#" class="text-orange-500">კერძები</a>
          <a href="#" class="hover:text-orange-500">რეცეპტები</a>
          <a href="#" class="hover:text-orange-500">სალათები</a>
          <a href="#" class="hover:text-orange-500">ცომეული</a>
        </nav>
      </div>
      <div class="flex-1 max-w-xl mx-8">
        <div class="relative">
          <input type="text" placeholder="მოძებნე კერძი ან ინგრედიენტი..." 
                 class="w-full bg-gray-100 border border-gray-200 rounded-full py-3 px-5 pl-12 focus:outline-none focus:border-orange-400">
          <i class="fas fa-search absolute left-5 top-3.5 text-gray-400"></i>
        </div>
      </div>
      <div class="flex items-center gap-6">
        <button class="flex items-center gap-2 text-sm font-medium">
          <i class="fas fa-map-marker-alt text-orange-500"></i>
          <span>თბილისი</span>
        </button>
        <button class="relative">
          <i class="fas fa-shopping-cart text-xl"></i>
          <span class="absolute -top-1 -right-1 bg-orange-500 text-white text-xs rounded-full w-5 h-5 flex items-center justify-center">3</span>
        </button>
        <div class="w-9 h-9 bg-orange-100 rounded-full flex items-center justify-center text-orange-600 font-semibold">ჯ</div>
      </div>
    </div>
  </header>

  <div class="max-w-7xl mx-auto px-4 py-8">
    <!-- Title -->
    <div class="flex justify-between items-center mb-8">
      <h1 class="text-3xl font-bold">კერძები</h1>
      <div class="flex gap-3">
        <button onclick="alert('ფილტრები გაიხსნა (დემო)')" 
                class="px-5 py-2 border border-gray-300 rounded-xl flex items-center gap-2 hover:bg-gray-50">
          <i class="fas fa-sliders-h"></i> ფილტრები
        </button>
        <button class="px-5 py-2 bg-orange-500 text-white rounded-xl flex items-center gap-2 hover:bg-orange-600">
          <i class="fas fa-sort"></i> პოპულარული
        </button>
      </div>
    </div>

    <!-- Menu Grid -->
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6" id="menu-grid">
      <!-- Cards will be inserted by JS -->
    </div>

    <!-- Pagination -->
    <div class="flex justify-center gap-3 mt-12">
      <button class="w-10 h-10 flex items-center justify-center border rounded-xl bg-orange-500 text-white">1</button>
      <button class="w-10 h-10 flex items-center justify-center border rounded-xl hover:bg-gray-50">2</button>
    </div>
  </div>

  <script>
    const dishes = [
      {name: "ხორცის როლადი", price: "25.00 ლ", time: "35 წთ", rating: "4.8", img: "https://picsum.photos/id/1015/400/300"},
      {name: "დოლმა", price: "18.50 ლ", time: "40 წთ", rating: "4.9", img: "https://picsum.photos/id/292/400/300"},
      {name: "ხაჭაპური აჭარული", price: "22.00 ლ", time: "25 წთ", rating: "5.0", img: "https://picsum.photos/id/431/400/300"},
      {name: "შაშლიკი", price: "28.00 ლ", time: "50 წთ", rating: "4.7", img: "https://picsum.photos/id/201/400/300"},
      {name: "სოკოს ხარჩო", price: "15.00 ლ", time: "30 წთ", rating: "4.6", img: "https://picsum.photos/id/292/400/300"},
      {name: "ცეზარის სალათა", price: "16.50 ლ", time: "15 წთ", rating: "4.9", img: "https://picsum.photos/id/870/400/300"},
      {name: "ჩაქაპული", price: "24.00 ლ", time: "45 წთ", rating: "4.8", img: "https://picsum.photos/id/431/400/300"},
      {name: "ხინკალი (12 ცალი)", price: "20.00 ლ", time: "30 წთ", rating: "5.0", img: "https://picsum.photos/id/1015/400/300"},
      // შეგიძლია დაამატო დანარჩენი კერძები იგივე ფორმატით
    ];

    const grid = document.getElementById('menu-grid');
    
    dishes.forEach(dish => {
      const cardHTML = `
        <div class="card bg-white rounded-3xl overflow-hidden shadow-sm border border-gray-100">
          <div class="relative">
            <img src="${dish.img}" class="w-full h-52 object-cover">
            <div class="absolute top-3 right-3 bg-white/90 px-3 py-1 rounded-2xl text-sm font-medium flex items-center gap-1">
              <i class="fas fa-clock text-orange-500"></i> ${dish.time}
            </div>
            <div class="absolute top-3 left-3 bg-white/90 px-2.5 py-1 rounded-2xl text-xs font-semibold flex items-center gap-1">
              ★ ${dish.rating}
            </div>
          </div>
          <div class="p-5">
            <h3 class="font-semibold text-lg mb-1">${dish.name}</h3>
            <div class="flex justify-between items-center">
              <div>
                <span class="text-2xl font-bold text-orange-600">${dish.price}</span>
              </div>
              <button onclick="addToCart('${dish.name}')" 
                      class="bg-orange-500 hover:bg-orange-600 text-white px-6 py-2.5 rounded-2xl text-sm font-medium transition">
                დამატება
              </button>
            </div>
          </div>
        </div>
      `;
      grid.innerHTML += cardHTML;
    });

    function addToCart(name) {
      alert(name + " დაემატა კალათაში! (დემო)");
    }
  </script>
</body>
</html>
