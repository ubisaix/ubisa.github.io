<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>საქართველოს საინფორმაციო გზამკვლევი</title>
    <style>
        /* --- თანამედროვე CSS ცვლადები და გლობალური სტილები --- */
        :root {
            --bg-dark: #090d16;
            --panel-bg: rgba(30, 41, 59, 0.4);
            --card-bg: rgba(255, 255, 255, 0.03);
            --primary: #38bdf8;
            --primary-glow: rgba(56, 189, 248, 0.15);
            --accent: #818cf8;
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --border-color: rgba(255, 255, 255, 0.08);
            --radius-lg: 16px;
            --radius-md: 12px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            scroll-behavior: smooth;
        }

        body {
            background: radial-gradient(circle at 50% 0%, #1e2640 0%, var(--bg-dark) 70%);
            background-attachment: fixed;
            color: var(--text-main);
            min-height: 100vh;
            padding-bottom: 80px;
            overflow-x: hidden;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px;
        }

        /* --- დახვეწილი ჰედერი --- */
        header {
            text-align: center;
            padding: 70px 0 40px;
            position: relative;
        }

        header h1 {
            font-size: 2.8rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #fff 40%, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 12px;
        }

        header p {
            color: var(--text-muted);
            font-size: 1.15rem;
            max-width: 600px;
            margin: 0 auto 35px;
            line-height: 1.6;
        }

        /* --- ფუტურისტული საძიებო ველი --- */
        .search-container {
            max-width: 600px;
            margin: 0 auto;
            position: relative;
        }

        .search-box {
            width: 100%;
            padding: 18px 28px;
            font-size: 1.1rem;
            border-radius: 50px;
            border: 1px solid var(--border-color);
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            color: #fff;
            outline: none;
            transition: var(--transition);
            box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.3);
        }

        .search-box:focus {
            border-color: var(--primary);
            box-shadow: 0 0 25px rgba(56, 189, 248, 0.25), inset 0 2px 4px rgba(0, 0, 0, 0.2);
            background: rgba(15, 23, 42, 0.8);
        }

        .search-box::placeholder {
            color: #64748b;
        }

        /* --- პრემიუმ აკორდეონები (Glassmorphism) --- */
        .category-accordion {
            margin-bottom: 20px;
            background: var(--panel-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            overflow: hidden;
            transition: var(--transition);
        }

        .category-header {
            padding: 22px 28px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            user-select: none;
            transition: var(--transition);
        }

        .category-header:hover {
            background: rgba(255, 255, 255, 0.02);
        }

        .category-title {
            font-size: 1.35rem;
            color: #fff;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 14px;
            transition: var(--transition);
        }

        .category-title span.icon {
            font-size: 1.25rem;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .toggle-icon {
            font-size: 0.85rem;
            color: var(--text-muted);
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            background: rgba(255, 255, 255, 0.05);
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            border: 1px solid var(--border-color);
        }

        /* --- ანიმაციური კონტენტის ჩამოშლა --- */
        .category-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1), padding 0.4s ease;
            padding: 0 28px;
            background: rgba(9, 13, 22, 0.4);
        }

        /* აქტიური აკორდეონის მდგომარეობა */
        .category-accordion.active {
            border-color: rgba(56, 189, 248, 0.3);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
        }

        .category-accordion.active .category-title {
            color: var(--primary);
        }

        .category-accordion.active .category-content {
            max-height: 2500px; /* თავსებადია დიდი კონტენტისთვის */
            padding: 30px 28px 32px;
            border-top: 1px solid rgba(255, 255, 255, 0.04);
        }

        .category-accordion.active .toggle-icon {
            transform: rotate(180deg);
            color: var(--primary);
            background: rgba(56, 189, 248, 0.1);
            border-color: rgba(56, 189, 248, 0.2);
        }

        /* --- ბარათების ბადე (Grid) --- */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 24px;
        }

        /* --- სუპერ თანამედროვე ბარათები --- */
        .card {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: var(--radius-md);
            padding: 24px;
            transition: var(--transition);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
        }

        .card:hover {
            transform: translateY(-4px);
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(56, 189, 248, 0.25);
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.2);
        }

        .card-content h3 {
            font-size: 1.2rem;
            font-weight: 600;
            color: #fff;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        /* --- ინფო ველები --- */
        .info-item {
            margin-bottom: 14px;
            font-size: 0.95rem;
            display: flex;
            align-items: flex-start;
            line-height: 1.5;
        }

        .info-item:last-child {
            margin-bottom: 0;
        }

        .info-label {
            font-weight: 500;
            color: var(--text-muted);
            min-width: 100px;
            flex-shrink: 0;
            font-size: 0.9rem;
        }

        .info-value {
            color: #e2e8f0;
        }

        /* კონტაქტის (Hotline) ახალი სტილი */
        .hotline {
            background: linear-gradient(135deg, rgba(56, 189, 248, 0.1), rgba(129, 140, 242, 0.1));
            padding: 4px 12px;
            border-radius: 6px;
            color: var(--primary);
            font-weight: 600;
            border: 1px solid rgba(56, 189, 248, 0.15);
            display: inline-block;
            letter-spacing: 0.5px;
        }

        /* ლინკები */
        .info-value a {
            color: var(--primary);
            text-decoration: none;
            transition: var(--transition);
            font-weight: 500;
        }

        .info-value a:hover {
            color: #7dd3fc;
            text-shadow: 0 0 8px rgba(56, 189, 248, 0.4);
        }

        /* --- "შედეგი ვერ მოიძებნა" შეტყობინება --- */
        #no-results {
            text-align: center;
            font-size: 1.25rem;
            color: var(--text-muted);
            margin: 80px 0;
            padding: 30px;
            background: var(--panel-bg);
            border-radius: var(--radius-lg);
            border: 1px dashed var(--border-color);
            display: none;
        }
    </style>
</head>
<body>

    <!-- ჰედერი საძიებო სისტემით -->
    <header>
        <div class="container">
            <h1>საქართველოს საინფორმაციო გზამკვლევი</h1>
            <p>სახელმწიფო უწყებების, კლინიკების, ფინანსური, სავაჭრო და გასართობი ობიექტების ერთიანი მონაცემთა ბაზა</p>
            <div class="search-container">
                <input type="text" id="searchInput" class="search-box" placeholder="ჩაწერეთ სახელი, ნომერი ან მისამართი...">
            </div>
        </div>
    </header>

    <!-- ძირითადი კონტენტი -->
    <div class="container">
        <div id="no-results">🔍 სამწუხაროდ, მსგავსი ობიექტი ვერ მოიძებნა...</div>
        <div id="accordion-container"></div>
    </div>

    <!-- მონაცემთა ბაზა და ლოგიკა (ზუსტად უცვლელი შინაარსი) -->
    <script>
        const database = [

                address: "თბილისი, ინგოროყვას ქ. 7",

            },

            // --- კლინიკები და საავადმყოფოები ---
            {
                id: "hospitals",
                categoryName: "კლინიკები და საავადმყოფოები",

                phone: "2 190 190",
                address: "თბილისი, კრწანისის ქ. 12",
                website: "https://newhospitals.ge"
            },
            {
                id: "hospitals",
                categoryName: "კლინიკები და საავადმყოფოები",
                title: "ავერსის კლინიკა (ცენტრალური)",
                phone: "2 500 700",
                address: "თბილისი, აკაკი წერეთლის გამზ. 141ა",

            {

            {

                website: "https://aversi.ge"
            },
            {

                phone: "2 404 040",
                address: "ფართო ქსელი მთელი საქართველოს მასშტაბით",
                website: "https://psp.ge"
            },
            {
                id: "pharmacies",
                categoryName: "აფთიაქები",
                title: "ჯიპისი (GPC აფთიაქი)",
                phone: "2 940 700",
                address: "თბილისი და რეგიონები",
                website: "https://gpc.ge"
            },

            // --- რესტორნები და კაფეები ---
            {
                id: "restaurants",
                categoryName: "რესტორნები და კაფეები",
                title: "რესტორნების ქსელი „წისქვილი ჯგუფი“",
                phone: "2 530 797",
                address: "თბილისი: ბელიაშვილის ქც. / წყნეთის გზატკეცილი / ვახუშტი ბაგრატიონის ხიდი",
                website: "https://tsiskvili.ge"
            },
            {
                id: "restaurants",
                categoryName: "რესტორნები და კაფეები",
                title: "შუხმანი ვაინ ბარი (Schuchmann Wine Bar)",
                phone: "032 2 601 555",
                address: "თბილისი, სიონის ქ. 8 (კარვასლა)",
                website: "https://schuchmann-wine.com"
            },
            {
                id: "restaurants",
                categoryName: "რესტორნები და კაფეები",
                title: "რესტორანი „ამაყი“ (Tabla/Proud)",
                phone: "2 601 111",
                address: "თბილისი, ილია ჭავჭავაძის გამზ. 33",
                website: "https://tabla.ge"
            },

            // --- ბანკები და ფინანსები ---
            {
                id: "finance",
                categoryName: "ბანკები და ფინანსები",
                title: "საქართველოს ბანკი (Bank of Georgia)",
                phone: "2 444 444",
                address: "სათაო: თბილისი, ა. ყაზბეგის გამზ. 29ა",
                website: "https://bog.ge"
            },
            {
                id: "finance",
                categoryName: "ბანკები და ფინანსები",
                title: "თიბისი ბანკი (TBC Bank)",
                phone: "2 272 727",
                address: "სათაო: თბილისი, კ. მარჯანიშვილის ქ. 7",
                website: "https://tbcbank.ge"
            }
            {
                id: "send",
                categoryName: "მიტანის სერვისი",
                title: "თიბისი ბანკი (TBC Bank)",
                phone: "2 272 727",
                address: "სათაო: თბილისი, კ. მარჯანიშვილის ქ. 7",
                website: "https://tbcbank.ge"
            }
        ];
     
        // უნიკალური კატეგორიების ამოღება
        function getUniqueCategories(data) {
            const categories = {};
            data.forEach(item => {
                if (!categories[item.id]) {
                    categories[item.id] = item.categoryName;
                }
            });
            return categories;
        }

        // აკორდეონების გენერირება (უცვლელი ფუნქციონალით)
        function renderAccordion(filterText = '') {
            const container = document.getElementById('accordion-container');
            const categories = getUniqueCategories(database);
            const query = filterText.toLowerCase().trim();
            
            let finalHTML = '';
            let globalHasResults = false;

            for (let catId in categories) {
                const filteredItems = database.filter(item => {
                    if (item.id !== catId) return false;
                    return (
                        item.title.toLowerCase().includes(query) ||
                        item.phone.toLowerCase().includes(query) ||
                        item.address.toLowerCase().includes(query) ||
                        item.categoryName.toLowerCase().includes(query)
                    );
                });

                if (filteredItems.length > 0) {
                    globalHasResults = true;
                    const isExpanded = query.length > 0 ? 'active' : '';

                    let catHTML = `
                        <div class="category-accordion ${isExpanded}" id="accordion-${catId}">
                            <div class="category-header" onclick="toggleAccordion('${catId}')">
                                <div class="category-title">
                                    <span class="icon">●</span> ${categories[catId]} (${filteredItems.length})
                                </div>
                                <div class="toggle-icon">▲</div>
                            </div>
                            <div class="category-content">
                                <div class="grid-container">
                    `;

                    filteredItems.forEach(item => {
                        catHTML += `
                            <div class="card">
                                <div class="card-content">
                                    <h3>${item.title}</h3>
                                    <div class="info-item">
                                        <span class="info-label">კონტაქტი:</span>
                                        <span class="info-value"><span class="hotline">${item.phone}</span></span>
                                    </div>
                                    <div class="info-item">
                                        <span class="info-label">მისამართი:</span>
                                        <span class="info-value">${item.address}</span>
                                    </div>
                                    <div class="info-item">
                                        <span class="info-label">ვებ-გვერდი:</span>
                                        <span class="info-value">
                                            <a href="${item.website}" target="_blank">${item.website.replace('https://', '')}</a>
                                        </span>
                                    </div>
                                </div>
                            </div>
                        `;
                    });

                    catHTML += `
                                </div>
                            </div>
                        </div>
                    `;
                    finalHTML += catHTML;
                }
            }

            container.innerHTML = finalHTML;
            document.getElementById('no-results').style.display = globalHasResults ? 'none' : 'block';
        }

        // ტოგლინგის ფუნქცია
        function toggleAccordion(catId) {
            const accordionElement = document.getElementById(`accordion-${catId}`);
            if (accordionElement) {
                accordionElement.classList.toggle('active');
            }
        }

        // ძებნის ივენთი
        document.getElementById('searchInput').addEventListener('input', function() {
            renderAccordion(this.value);
        });

        // სტარტი
        renderAccordion();
    </script>
</body>
</html>
