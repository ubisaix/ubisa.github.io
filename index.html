<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ubisa - სამშენებლო კალკულატორები</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');

        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent: #f59e0b; /* თქვენი საიტის ყვითელი ფერი */
            --text-white: #f8fafc;
            --input-bg: #334155;
            --border: rgba(255, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-white);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 600px;
        }

        h1 {
            text-align: center;
            font-size: 1.8rem;
            margin-bottom: 30px;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .calc-card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 25px;
            border: 1px solid var(--border);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        h2 {
            font-size: 1.2rem;
            margin-top: 0;
            margin-bottom: 20px;
            border-left: 4px solid var(--accent);
            padding-left: 10px;
            color: var(--text-white);
        }

        .input-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .full-width {
            grid-column: span 2;
        }

        .input-box label {
            display: block;
            font-size: 0.8rem;
            color: #94a3b8;
            margin-bottom: 5px;
        }

        input {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid var(--border);
            padding: 12px;
            border-radius: 10px;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
        }

        input:focus {
            border-color: var(--accent);
        }

        .btn-calc {
            width: 100%;
            background: var(--accent);
            color: #000;
            border: none;
            padding: 15px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
        }

        .btn-calc:active {
            transform: scale(0.97);
        }

        .result-box {
            margin-top: 20px;
            padding: 15px;
            background: rgba(0,0,0,0.2);
            border-radius: 12px;
            display: none;
        }

        .res-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 0.95rem;
        }

        .res-row b {
            color: var(--accent);
        }

        @media (max-width: 480px) {
            .input-grid { grid-template-columns: 1fr; }
            .full-width { grid-column: span 1; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Ubisa კალკულატორი</h1>

    <div class="calc-card">
        <h2>1. ბლოკის დათვლა</h2>
        <div class="input-grid">
            <div class="input-box">
                <label>სიგრძე (მ)</label>
                <input type="number" id="b_len" placeholder="0">
            </div>
            <div class="input-box">
                <label>სიმაღლე (მ)</label>
                <input type="number" id="b_height" placeholder="0">
            </div>
            <div class="input-box">
                <label>კარი/ფანჯარა (მ²)</label>
                <input type="number" id="b_minus" value="0">
            </div>
            <div class="input-box">
                <label>ბლოკი 1მ²-ზე</label>
                <input type="number" id="b_per_m" value="12.5">
            </div>
        </div>
        <button class="btn-calc" onclick="calcBlock()">გამოთვლა</button>
        <div id="res_block" class="result-box">
            <div class="res-row"><span>ფართობი:</span> <b id="r_b_area">0</b> მ²</div>
            <div class="res-row"><span>რაოდენობა:</span> <b id="r_b_count">0</b> ცალი</div>
        </div>
    </div>

    <div class="calc-card">
        <h2>2. ქვიშა და ცემენტი (შელესვა)</h2>
        <div class="input-grid">
            <div class="input-box">
                <label>ფართობი (მ²)</label>
                <input type="number" id="s_area" placeholder="0">
            </div>
            <div class="input-box">
                <label>სისქე (სმ)</label>
                <input type="number" id="s_thick" value="2">
            </div>
        </div>
        <button class="btn-calc" onclick="calcSand()">გამოთვლა</button>
        <div id="res_sand" class="result-box">
            <div class="res-row"><span>ცემენტი (50კგ):</span> <b id="r_s_cement">0</b> ტომარა</div>
            <div class="res-row"><span>ქვიშა:</span> <b id="r_s_sand">0</b> მ³</div>
        </div>
    </div>

    <div class="calc-card">
        <h2>3. ბეტონის მოცულობა</h2>
        <div class="input-grid">
            <div class="input-box">
                <label>სიგრძე (მ)</label>
                <input type="number" id="c_len" placeholder="0">
            </div>
            <div class="input-box">
                <label>სიგანე (მ)</label>
                <input type="number" id="c_width" placeholder="0">
            </div>
            <div class="input-box full-width">
                <label>სისქე/სიმაღლე (მ)</label>
                <input type="number" id="c_height" placeholder="0.2">
            </div>
        </div>
        <button class="btn-calc" onclick="calcConcrete()">გამოთვლა</button>
        <div id="res_concrete" class="result-box">
            <div class="res-row"><span>მოცულობა:</span> <b id="r_c_vol">0</b> მ³</div>
        </div>
    </div>
</div>

<script>
    function calcBlock() {
        let l = parseFloat(document.getElementById('b_len').value) || 0;
        let h = parseFloat(document.getElementById('b_height').value) || 0;
        let m = parseFloat(document.getElementById('b_minus').value) || 0;
        let p = parseFloat(document.getElementById('b_per_m').value) || 0;
        
        let area = (l * h) - m;
        let count = Math.ceil(area * p);
        
        document.getElementById('r_b_area').innerText = area.toFixed(2);
        document.getElementById('r_b_count').innerText = count;
        document.getElementById('res_block').style.display = 'block';
    }

    function calcSand() {
        let a = parseFloat(document.getElementById('s_area').value) || 0;
        let t = parseFloat(document.getElementById('s_thick').value) || 0;
        
        // საშუალო ხარჯი: 1მ²-ზე 2სმ სისქეზე ~0.25 ტომარა ცემენტი
        let cement = Math.ceil(a * (t / 2) * 0.25);
        let sand = (a * (t / 100)).toFixed(2);
        
        document.getElementById('r_s_cement').innerText = cement;
        document.getElementById('r_s_sand').innerText = sand;
        document.getElementById('res_sand').style.display = 'block';
    }

    function calcConcrete() {
        let l = parseFloat(document.getElementById('c_len').value) || 0;
        let w = parseFloat(document.getElementById('c_width').value) || 0;
        let h = parseFloat(document.getElementById('c_height').value) || 0;
        
        let vol = (l * w * h).toFixed(2);
        
        document.getElementById('r_c_vol').innerText = vol;
        document.getElementById('res_concrete').style.display = 'block';
    }
</script>

</body>
</html>
