<!DOCTYPE html>
<html lang="ka">
<head>
  <meta charset="UTF-8">
  <title>Smart Search</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f1f3f4;
      text-align: center;
      padding: 50px;
    }

    h1 {
      font-size: 42px;
      color: #202124;
    }

    input {
      width: 60%;
      padding: 12px;
      font-size: 18px;
      border-radius: 25px;
      border: 1px solid #ccc;
      outline: none;
    }

    button {
      margin-top: 15px;
      padding: 10px 25px;
      font-size: 16px;
      border-radius: 20px;
      border: none;
      background: #4285f4;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #3367d6;
    }

    #ai-result {
      margin-top: 40px;
      text-align: left;
      width: 60%;
      margin-left: auto;
      margin-right: auto;
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    .gcse-search {
      margin-top: 40px;
    }
  </style>

  <!-- Google Search -->
  <script async src="https://cse.google.com/cse.js?cx=YOUR_CX_ID"></script>
</head>

<body>

  <h1>🔍 Smart Search</h1>

  <input type="text" id="query" placeholder="დაწერე კითხვა ან საძიებო სიტყვა...">
  <br>
  <button onclick="searchAI()">AI პასუხი</button>

  <div id="ai-result"></div>

  <!-- Google Results -->
  <div class="gcse-search"></div>

  <script>
    async function searchAI() {
      const query = document.getElementById("query").value;
      const resultDiv = document.getElementById("ai-result");

      resultDiv.innerHTML = "⏳ იტვირთება...";

      try {
        const response = await fetch("https://api.openai.com/v1/chat/completions", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer YOUR_OPENAI_API_KEY"
          },
          body: JSON.stringify({
            model: "gpt-4o-mini",
            messages: [
              { role: "user", content: query }
            ]
          })
        });

        const data = await response.json();
        const answer = data.choices[0].message.content;

        resultDiv.innerHTML = "<h3>🤖 AI პასუხი:</h3><p>" + answer + "</p>";
      } catch (error) {
        resultDiv.innerHTML = "❌ შეცდომა AI-სთან დაკავშირებისას";
      }
    }
  </script>

</body>
</html>
