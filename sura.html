    <style>
        :root { --bg:#0f1320; --panel:#13182a; --text:#eef2ff; --muted:#a9b1c7; --accent:#d4af37; --accent-2:#274690; }
        * { box-sizing:border-box; }
        body {
            margin:0; font-family:system-ui,-apple-system,Segoe UI,Roboto;
            background: linear-gradient(rgba(0,0,0,.45),rgba(0,0,0,.7)), url('https://ubisa.ge/ukana.jpg') center/cover fixed no-repeat;
            color:var(--text); min-height:100vh; display:grid; grid-template-rows:auto 1fr; user-select:none;
        }
        header { padding:14px 20px; background:rgba(19,24,42,.7); border-bottom:1px solid rgba(255,255,255,.08); display:flex; align-items:center; justify-content:space-between; gap:20px; }
        .brand { display:flex; align-items:center; gap:10px; }
        .cross { width:18px;height:18px; border:2px solid var(--accent); position:relative; }
        .cross::before,.cross::after { content:"";position:absolute;background:var(--accent); }
        .cross::before {width:2px;height:18px;left:50%;transform:translateX(-50%);}
        .cross::after {height:2px;width:18px;top:50%;transform:translateY(-50%);}
        .title { font-weight:600; }
        .nav { display:flex; gap:14px; flex-wrap:wrap; }
        .nav a { color:var(--text); text-decoration:none; font-size:14px; padding:6px 10px; border-radius:8px; border:1px solid transparent; }
        .nav a:hover { color:var(--accent); border-color:var(--accent); }
        .tools { display:flex; gap:10px; }
        .btn { padding:8px 12px; font-size:14px; border:1px solid rgba(255,255,255,.12); background:transparent; color:var(--text); border-radius:8px; cursor:pointer; }
        
        .gallery { max-width:1100px; margin:0 auto; padding:16px; }
        .slider { position:relative; width:100%; aspect-ratio:16/9; border-radius:14px; overflow:hidden; background:#000; }
        .slide-bg { position:absolute; inset:0; background-size:cover; background-position:center; filter:blur(30px) brightness(.6); transform:scale(1.2); z-index:0; }
        .slides { display:flex; height:100%; transition:transform .4s ease; position:relative; z-index:1; }
        .slide { flex:0 0 100%; display:flex; align-items:center; justify-content:center; position:relative; }
        .slide img { max-width:100%; max-height:100%; object-fit:contain; pointer-events:none; }
        .caption { position:absolute; left:12px; bottom:12px; background:rgba(0,0,0,.45); padding:6px 10px; border-radius:8px; font-size:13px; z-index:4; }
        .control { position:absolute; top:50%; transform:translateY(-50%); width:42px; height:42px; border-radius:50%; border:1px solid rgba(255,255,255,.18); background:rgba(0,0,0,.4); color:#fff; display:grid; place-items:center; cursor:pointer; z-index:5; }
        .prev { left:12px; } .next { right:12px; }

        .thumbs-container { margin-top:12px; background:rgba(19,24,42,.7); padding:10px; border-radius:12px; }
        .thumbs { display:grid; grid-template-columns:repeat(auto-fill,minmax(90px,1fr)); gap:8px; }
        .thumb { aspect-ratio:4/3; overflow:hidden; border-radius:10px; border:1px solid rgba(255,255,255,.1); cursor:pointer; }
        .thumb img { width:100%; height:100%; object-fit:cover; pointer-events:none; }
        .thumb.active { outline:2px solid var(--accent); }

        /* Pagination Styles */
        .pager { display: flex; justify-content: center; align-items: center; gap: 15px; margin-top: 10px; padding-top: 10px; border-top: 1px solid rgba(255,255,255,0.1); }
        .page-info { font-size: 14px; color: var(--muted); }

        @media(max-width:800px){ header { flex-wrap:wrap; } }
    </style>
</head>

const slides = document.getElementById("slides");
const thumbs = document.getElementById("thumbs");
const bg = document.getElementById("slideBg");
const pageInfo = document.getElementById("pageInfo");

let index = 0, auto = false, timer;
let currentPage = 0;
const itemsPerPage = 12; // რამდენი სურათი გამოჩნდეს ქვემოთ ერთ გვერდზე

// სლაიდების შექმნა (Lazy loading პრინციპით)
images.forEach((img, i) => {
    slides.innerHTML += `
        <div class="slide">
            <img src="${img.src}" draggable="false" loading="lazy">
            <div class="caption">${img.cap}</div>
        </div>`;
});

function renderThumbs() {
    thumbs.innerHTML = "";
    const start = currentPage * itemsPerPage;
    const end = start + itemsPerPage;
    const pageItems = images.slice(start, end);

    pageItems.forEach((img, i) => {
        const globalIndex = start + i;
        thumbs.innerHTML += `
            <div class="thumb ${globalIndex === index ? 'active' : ''}" onclick="goTo(${globalIndex})">
                <img src="${img.src}" draggable="false">
            </div>`;
    });
    
    const totalPages = Math.ceil(images.length / itemsPerPage);
    pageInfo.textContent = `გვერდი ${currentPage + 1} / ${totalPages}`;
}

function goTo(i) {
    index = (i + images.length) % images.length;
    slides.style.transform = `translateX(-${index * 100}%)`;
    bg.style.backgroundImage = `url(${images[index].src})`;
    
    // ავტომატურად გადავიყვანოთ თამბების გვერდი, თუ არჩეული სურათი სხვა გვერდზეა
    const targetPage = Math.floor(index / itemsPerPage);
    if (currentPage !== targetPage) {
        currentPage = targetPage;
    }
    renderThumbs();
}

// Pagination ღილაკები
document.getElementById("nextPage").onclick = () => {
    if ((currentPage + 1) * itemsPerPage < images.length) {
        currentPage++;
        renderThumbs();
    }
};

document.getElementById("prevPage").onclick = () => {
    if (currentPage > 0) {
        currentPage--;
        renderThumbs();
    }
};

// კონტროლის ღილაკები
prevBtn.onclick = () => goTo(index - 1);
nextBtn.onclick = () => goTo(index + 1);

autoBtn.onclick = () => {
    auto = !auto;
    autoBtn.textContent = auto ? "Stop" : "ავტო სლაიდი";
    auto ? timer = setInterval(() => goTo(index + 1), 3000) : clearInterval(timer);
};

shuffleBtn.onclick = () => goTo(Math.floor(Math.random() * images.length));

// საწყისი ჩატვირთვა
goTo(0);
renderThumbs();

</script>
