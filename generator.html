<!DOCTYPE html>
<html>
<head>
    <title>რეცეპტის დამატება</title>
    <style>
        body { font-family: sans-serif; padding: 20px; line-height: 1.6; }
        input, textarea { width: 100%; padding: 8px; margin: 5px 0 15px; display: block; border: 1px solid #ccc; }
        button { background: #28a745; color: white; padding: 10px 20px; border: none; cursor: pointer; }
        #result { background: #f4f4f4; padding: 15px; border-left: 5px solid #28a745; white-space: pre-wrap; margin-top: 20px; }
    </style>
</head>
<body>

    <h3>დაამატე ახალი რეცეპტი</h3>
    
    ID: <input type="number" id="id" value="61">
    კატეგორია: <input type="text" id="cat" placeholder="მაგ: სალათები">
    სახელი: <input type="text" id="name" placeholder="მაგ: ბორში">
    დრო: <input type="text" id="time" placeholder="მაგ: 1 სთ">
    კალორია: <input type="text" id="cal" placeholder="247">
    პორცია: <input type="text" id="por" placeholder="7">
    სურათის ლინკი: <input type="text" id="img" placeholder="https://...">
    ინგრედიენტები (გამოყავი მძიმით): <textarea id="ing" rows="2"></textarea>
    მომზადების ტექსტი: <textarea id="text" rows="3"></textarea>

    <button onclick="generate()">კოდის გენერაცია</button>

    <div id="result">აქ გამოჩნდება მზა კოდი...</div>

    <script>
        function generate() {
            const ingArr = document.getElementById('ing').value.split(',').map(i => `"${i.trim()}"`);
            
            const obj = `{ 
  id: ${document.getElementById('id').value}, 
  cat: "${document.getElementById('cat').value}", 
  name: "${document.getElementById('name').value}", 
  time: "${document.getElementById('time').value}", 
  views: "0", 
  cal: "${document.getElementById('cal').value}", 
  por: "${document.getElementById('por').value}", 
  img: "${document.getElementById('img').value}", 
  ing: [${ingArr.join(", ")}], 
  text: "${document.getElementById('text').value.replace(/\n/g, " ")}" 
},`;

            document.getElementById('result').innerText = obj;
        }
    </script>
</body>
</html>
