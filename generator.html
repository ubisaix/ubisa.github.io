<!DOCTYPE html>
<html>
<head>
    <title>რეცეპტის დამატება</title>
    <style>
        body { font-family: sans-serif; padding: 20px; line-height: 1.6; max-width: 800px; margin: auto; }
        input, textarea { width: 100%; padding: 10px; margin: 5px 0 15px; display: block; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { background: #28a745; color: white; padding: 12px 20px; border: none; cursor: pointer; border-radius: 4px; font-weight: bold; width: 100%; margin-bottom: 10px; }
        button:hover { background: #218838; }
        
        #result { 
            background: #f4f4f4; 
            padding: 15px; 
            border-left: 5px solid #28a745; 
            margin-top: 20px; 
            font-family: monospace; 
            font-size: 13px; 
            min-height: 40px;
            /* ეს აკეთებს ერთ გრძელ ხაზს */
            white-space: pre; 
            overflow-x: auto;
            display: block;
        }
        
        .copy-btn { background: #007bff; }
        .copy-btn:hover { background: #0069d9; }
        .row { display: flex; gap: 10px; }
        .row div { flex: 1; }
    </style>
</head>
<body>

    <h3>🚀 რეცეპტის ერთხაზიანი გენერატორი</h3>
    
    <div class="row">
        <div>ID: <input type="number" id="id" value="61"></div>
        <div>ნახვები: <input type="text" id="views" placeholder="მაგ: 1.433k"></div>
    </div>

    კატეგორია: <input type="text" id="cat" placeholder="სალათები">
    სახელი: <input type="text" id="name" placeholder="სახელი">
    
    <div class="row">
        <div>დრო: <input type="text" id="time" placeholder="1 სთ"></div>
        <div>კალორია: <input type="text" id="cal" placeholder="247"></div>
        <div>პორცია: <input type="text" id="por" placeholder="7"></div>
    </div>

    სურათის ლინკი: <input type="text" id="img" placeholder="https://...">
    ინგრედიენტები (გამოყავით მძიმით): <textarea id="ing" rows="2"></textarea>
    მომზადების ტექსტი: <textarea id="text" rows="2"></textarea>

    <button onclick="generate()">⚡ კოდის გენერაცია</button>
    <button onclick="copyToClipboard()" class="copy-btn">📋 კოდის კოპირება</button>

    <div id="result">აქ გამოჩნდება ერთხაზიანი კოდი...</div>

    <script>
        function clean(str) {
            // აშორებს ხაზის გადატანებს და ზედმეტ დაშორებებს ობიექტის შიგნით
            return str.replace(/\r?\n|\r/g, " ").replace(/\s+/g, " ").trim();
        }

        function generate() {
            const rawIng = document.getElementById('ing').value;
            // ინგრედიენტების მასივი ზედმეტი სფეისების გარეშე
            const ingArr = rawIng ? rawIng.split(',').map(i => `"${clean(i)}"`).join(",") : "";
            
            const id = document.getElementById('id').value;
            const views = clean(document.getElementById('views').value);
            const cat = clean(document.getElementById('cat').value);
            const name = clean(document.getElementById('name').value);
            const time = clean(document.getElementById('time').value);
            const cal = clean(document.getElementById('cal').value);
            const por = clean(document.getElementById('por').value);
            const img = clean(document.getElementById('img').value);
            const text = clean(document.getElementById('text').value);

            // აწყობს ზუსტად ერთ ხაზზე, მძიმით ბოლოში
            const obj = `{id:${id},cat:"${cat}",name:"${name}",time:"${time}",views:"${views}",cal:"${cal}",por:"${por}",img:"${img}",ing:[${ingArr}],text:"${text}"},`;

            document.getElementById('result').innerText = obj;
        }

        function copyToClipboard() {
            const text = document.getElementById('result').innerText;
            if(!text || text.includes("აქ გამოჩნდება")) return;
            navigator.clipboard.writeText(text).then(() => alert("კოპირებულია!"));
        }
    </script>

</body>
</html>
