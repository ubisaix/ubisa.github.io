<!DOCTYPE html>
<html>
<head>
    <title>რეცეპტის დამატება</title>
    <style>
        body { font-family: sans-serif; padding: 20px; line-height: 1.6; max-width: 800px; margin: auto; }
        input, textarea { width: 100%; padding: 10px; margin: 5px 0 15px; display: block; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { background: #28a745; color: white; padding: 12px 20px; border: none; cursor: pointer; border-radius: 4px; font-weight: bold; width: 100%; margin-bottom: 10px; }
        button:hover { background: #218838; }
        
        /* აქ ჩავამატე სტილი, რომ აუცილებლად ერთ ხაზზე გამოჩნდეს */
        #result { 
            background: #f4f4f4; 
            padding: 15px; 
            border-left: 5px solid #28a745; 
            margin-top: 20px; 
            font-family: monospace; 
            font-size: 13px; 
            min-height: 40px;
            white-space: nowrap; /* არ გადაიტანოს სიტყვა ახალ ხაზზე */
            overflow-x: auto;    /* თუ გრძელია, გაჩნდეს სქროლი */
        }
        
        .copy-btn { background: #007bff; }
        .copy-btn:hover { background: #0069d9; }
        .row { display: flex; gap: 10px; }
        .row div { flex: 1; }
    </style>
</head>
<body>

    <h3>🚀 ახალი რეცეპტის გენერატორი</h3>
    
    <div class="row">
        <div>ID: <input type="number" id="id" value="61"></div>
        <div>ნახვები: <input type="number" id="views" value="0"></div>
    </div>

    კატეგორია: <input type="text" id="cat" placeholder="მაგ: სალათები">
    სახელი: <input type="text" id="name" placeholder="მაგ: ჭარხლის სალათი">
    
    <div class="row">
        <div>დრო: <input type="text" id="time" placeholder="მაგ: 1 სთ 30 წთ"></div>
        <div>კალორია: <input type="text" id="cal" placeholder="830"></div>
        <div>პორცია: <input type="text" id="por" placeholder="4"></div>
    </div>

    სურათის ლინკი: <input type="text" id="img" placeholder="https://...">
    ინგრედიენტები (გამოყავი მძიმით): <textarea id="ing" rows="2" placeholder="ნიორი, ხახვი, მარილი..."></textarea>
    მომზადების ტექსტი: <textarea id="text" rows="3" placeholder="დაწერეთ მომზადების წესი..."></textarea>

    <button onclick="generate()">⚡ კოდის გენერაცია (ერთ ხაზზე)</button>
    <button onclick="copyToClipboard()" class="copy-btn">📋 კოდის კოპირება</button>

    <div id="result">აქ გამოჩნდება ერთხაზიანი კოდი...</div>

    <script>
        function generate() {
            const rawIng = document.getElementById('ing').value;
            const ingArr = rawIng ? rawIng.split(',').map(i => `"${i.trim()}"`) : [];
            
            // ტექსტის გასუფთავება (აშორებს ყველა ზედმეტ დაშორებას და ენთერს)
            const cleanText = document.getElementById('text').value.replace(/\s+/g, " ").trim().replace(/"/g, '\\"');
            
            const id = document.getElementById('id').value;
            const views = document.getElementById('views').value;
            const cat = document.getElementById('cat').value;
            const name = document.getElementById('name').value;
            const time = document.getElementById('time').value;
            const cal = document.getElementById('cal').value;
            const por = document.getElementById('por').value;
            const img = document.getElementById('img').value;

            // კონსტრუქცია აბსოლუტურად ყოველგვარი ზედმეტი სფეისის გარეშე ობიექტებს შორის
            const obj = `{id:${id},cat:"${cat}",name:"${name}",time:"${time}",views:"${views}",cal:"${cal}",por:"${por}",img:"${img}",ing:[${ingArr.join(",")}],text:"${cleanText}"},`;

            document.getElementById('result').innerText = obj;
        }

        function copyToClipboard() {
            const text = document.getElementById('result').innerText;
            if(text === "" || text.startsWith("აქ გამოჩნდება")) return;
            
            navigator.clipboard.writeText(text).then(() => {
                alert("კოდი დაკოპირდა ერთ ხაზად!");
            });
        }
    </script>

</body>
</html>
