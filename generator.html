<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <title>რეცეპტების გენერატორი</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; background: #f0f2f5; color: #333; }
        .container { max-width: 700px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #2c3e50; margin-bottom: 25px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .field { margin-bottom: 15px; }
        .full-width { grid-column: span 2; }
        label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 14px; color: #555; }
        input, textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 14px; }
        input:focus, textarea:focus { border-color: #007bff; outline: none; box-shadow: 0 0 5px rgba(0,123,255,0.2); }
        textarea { height: 100px; resize: vertical; }
        button { background: #28a745; color: white; padding: 12px; border: none; border-radius: 6px; cursor: pointer; width: 100%; font-size: 16px; font-weight: bold; transition: 0.3s; margin-top: 10px; }
        button:hover { background: #218838; }
        #result { margin-top: 20px; width: 100%; height: 120px; background: #2d2d2d; color: #9cdcfe; padding: 15px; font-family: 'Courier New', Courier, monospace; border-radius: 6px; border: none; font-size: 13px; }
        .copy-btn { background: #007bff; margin-top: 10px; }
        .copy-btn:hover { background: #0069d9; }
    </style>
</head>
<body>

<div class="container">
    <h2>🍳 რეცეპტის გენერატორი</h2>
    
    <div class="grid">
        <div class="field">
            <label>ID:</label>
            <input type="number" id="id" placeholder="მაგ: 62">
        </div>
        <div class="field">
            <label>ნახვები (views):</label>
            <input type="number" id="views" placeholder="0" value="0">
        </div>
        <div class="field">
            <label>კატეგორია (cat):</label>
            <input type="text" id="cat" placeholder="სალათები">
        </div>
        <div class="field">
            <label>სახელი (name):</label>
            <input type="text" id="name" placeholder="სოკოს სალათი">
        </div>
        <div class="field">
            <label>დრო (time):</label>
            <input type="text" id="time" placeholder="30წთ">
        </div>
        <div class="field">
            <label>კალორია (cal):</label>
            <input type="text" id="cal" placeholder="20">
        </div>
        <div class="field">
            <label>პორცია (por):</label>
            <input type="text" id="por" placeholder="6">
        </div>
        <div class="field">
            <label>სურათის ლინკი (img):</label>
            <input type="text" id="img" placeholder="URL მისამართი">
        </div>
        <div class="field full-width">
            <label>ინგრედიენტები (თითოეული ახალ ხაზზე):</label>
            <textarea id="ing" placeholder="250 გრ ქამა სოკო&#10;1/2 ჭიქა ბულგარული"></textarea>
        </div>
        <div class="field full-width">
            <label>მომზადების წესი (text):</label>
            <textarea id="text" placeholder="აღწერეთ მომზადების ნაბიჯები..."></textarea>
        </div>
    </div>

    <button onclick="generateJSON()">✨ კოდის გენერაცია</button>

    <textarea id="result" readonly></textarea>
    <button class="copy-btn" onclick="copyCode()">📋 კოდის დაკოპირება</button>
</div>

<script>
    function generateJSON() {
        const id = document.getElementById('id').value || "0";
        const cat = document.getElementById('cat').value;
        const name = document.getElementById('name').value;
        const time = document.getElementById('time').value;
        const views = document.getElementById('views').value || "0";
        const cal = document.getElementById('cal').value;
        const por = document.getElementById('por').value;
        const img = document.getElementById('img').value;
        const text = document.getElementById('text').value;

        // ინგრედიენტების დამუშავება
        const ingRaw = document.getElementById('ing').value.split('\n');
        const ingArr = ingRaw
            .filter(item => item.trim() !== "")
            .map(item => `"${item.trim().replace(/"/g, "'")}"`);

        // ტექსტის გასუფთავება (რომ JSON არ გაფუჭდეს)
        const cleanText = text.replace(/\n/g, " ").replace(/"/g, "'").trim();

        // ერთი ხაზი ფორმატი
        const result = `{ id: ${id}, cat: "${cat}", name: "${name}", time: "${time}", views: "${views}", cal: "${cal}", por: "${por}", img: "${img}", ing: [${ingArr.join(", ")}], text: "${cleanText}" },`;

        document.getElementById('result').value = result;
    }

    function copyCode() {
        const copyText = document.getElementById("result");
        if(!copyText.value) return;
        copyText.select();
        document.execCommand("copy");
        alert("კოდი წარმატებით დაკოპირდა!");
    }
</script>

</body>
</html>
