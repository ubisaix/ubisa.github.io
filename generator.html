<!DOCTYPE html>
<html>
<head>
    <title>რეცეპტის დამატება</title>
    <style>
        body { font-family: sans-serif; padding: 20px; line-height: 1.6; max-width: 800px; margin: auto; }
        input, textarea { width: 100%; padding: 10px; margin: 5px 0 15px; display: block; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { background: #28a745; color: white; padding: 12px 20px; border: none; cursor: pointer; border-radius: 4px; font-weight: bold; width: 100%; margin-bottom: 10px; }
        button:hover { background: #218838; }
        
        #result { 
            background: #f4f4f4; 
            padding: 15px; 
            border-left: 5px solid #28a745; 
            margin-top: 20px; 
            font-family: monospace; 
            font-size: 13px; 
            min-height: 40px;
            /* აიძულებს ტექსტს იყოს ერთ ხაზზე */
            white-space: nowrap; 
            overflow-x: scroll;
            display: block;
        }
        
        .copy-btn { background: #007bff; }
        .copy-btn:hover { background: #0069d9; }
        .row { display: flex; gap: 10px; }
        .row div { flex: 1; }
    </style>
</head>
<body>

    <h3>🚀 რეცეპტის ერთხაზიანი გენერატორი</h3>
    
    <div class="row">
        <div>ID: <input type="number" id="id" value="61"></div>
        <div>ნახვები: <input type="text" id="views" value="0"></div>
    </div>

    კატეგორია: <input type="text" id="cat" placeholder="მაგ: სალათები">
    სახელი: <input type="text" id="name" placeholder="მაგ: ჭარხლის სალათი">
    
    <div class="row">
        <div>დრო: <input type="text" id="time" placeholder="მაგ: 1 სთ 30 წთ"></div>
        <div>კალორია: <input type="text" id="cal" placeholder="830"></div>
        <div>პორცია: <input type="text" id="por" placeholder="4"></div>
    </div>

    სურათის ლინკი: <input type="text" id="img" placeholder="https://...">
    ინგრედიენტები (ჩაწერეთ სათითაოდ ან გადმოაკოპირეთ): <textarea id="ing" rows="3" placeholder="ხორცი, მარილი, წიწაკა..."></textarea>
    მომზადების ტექსტი: <textarea id="text" rows="3" placeholder="დაწერეთ მომზადების წესი..."></textarea>

    <button onclick="generate()">⚡ კოდის გენერაცია (1 ხაზზე)</button>
    <button onclick="copyToClipboard()" class="copy-btn">📋 კოდის კოპირება</button>

    <div id="result">აქ გამოჩნდება ერთხაზიანი კოდი...</div>

    <script>
        function cleanString(str) {
            // აშორებს ხაზის გადატანებს, ტაბებს და ზედმეტ სფეისებს
            return str.replace(/\r?\n|\r/g, " ").replace(/\s+/g, " ").trim().replace(/"/g, '\\"');
        }

        function generate() {
            // ინგრედიენტების დამუშავება: ვყოფთ მძიმით ან ხაზის გადატანით
            const rawIng = document.getElementById('ing').value;
            let ingArr = [];
            
            if (rawIng) {
                // ვყოფთ ან მძიმით, ან ახალი ხაზით
                ingArr = rawIng.split(/[,\n]/).map(i => i.trim()).filter(i => i !== "");
                ingArr = ingArr.map(i => `"${i}"`);
            }
            
            const id = document.getElementById('id').value;
            const views = cleanString(document.getElementById('views').value);
            const cat = cleanString(document.getElementById('cat').value);
            const name = cleanString(document.getElementById('name').value);
            const time = cleanString(document.getElementById('time').value);
            const cal = cleanString(document.getElementById('cal').value);
            const por = cleanString(document.getElementById('por').value);
            const img = cleanString(document.getElementById('img').value);
            const text = cleanString(document.getElementById('text').value);

            // საბოლოო ობიექტი აბსოლუტურად ყველანაირი დაშორების გარეშე
            const obj = `{id:${id},cat:"${cat}",name:"${name}",time:"${time}",views:"${views}",cal:"${cal}",por:"${por}",img:"${img}",ing:[${ingArr.join(",")}],text:"${text}"},`;

            document.getElementById('result').innerText = obj;
        }

        function copyToClipboard() {
            const text = document.getElementById('result').innerText;
            if(text === "" || text.startsWith("აქ გამოჩნდება")) return;
            
            navigator.clipboard.writeText(text).then(() => {
                alert("წარმატებით დაკოპირდა ერთ ხაზად!");
            });
        }
    </script>

</body>
</html>
